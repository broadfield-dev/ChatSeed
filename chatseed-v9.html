<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>ChatSeed v9 - Scratch Pad</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
*{-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#030712;color:#f3f4f6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.user-msg{background:#3b82f6;border-radius:18px 18px 4px 18px}
.assistant-msg{background:#1f2937;border-radius:18px 18px 18px 4px}
.tool-result-msg{background:#111827;border:1px solid #374151;border-radius:12px;padding:10px 16px;font-size:.82rem;color:#d1d5db;line-height:1.5}
.prose{max-width:none}
.prose pre{background:#111827;padding:1rem;border-radius:8px;overflow-x:auto;border:1px solid #374151;position:relative}
.prose pre:hover .copy-btn{opacity:1}
.prose code{font-size:.9em;background:#374151;padding:2px 4px;border-radius:4px}
.prose pre code{background:transparent;padding:0}
.copy-btn{position:absolute;top:6px;right:6px;opacity:0;transition:opacity .2s;background:#374151;border:1px solid #4b5563;color:#d1d5db;border-radius:6px;padding:4px 8px;font-size:.7rem;cursor:pointer;z-index:5}
.copy-btn:hover{background:#4b5563;color:white}
.msg-ts{font-size:.65rem;opacity:.5;margin-top:4px;cursor:default}
.msg-appear{animation:fadeSlideIn .3s ease-out}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
.token-badge{background:#374151;color:#9ca3af;border-radius:9999px;padding:2px 8px;font-size:.65rem}
.kbd{display:inline-block;padding:2px 6px;font-size:.7rem;background:#374151;border:1px solid #4b5563;border-radius:4px}
.step-entry{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#064e3b;border:1px solid #065f46;border-radius:8px;font-size:.75rem;color:#6ee7b7;animation:fadeSlideIn .3s ease-out;margin-bottom:2px}
.step-entry.completed{border-color:#059669;background:rgba(5,150,105,0.12)}
.step-entry .step-icon{font-size:0.65rem;width:14px;text-align:center}
.streaming-card{border:1px solid #374151;border-radius:10px;overflow:hidden;background:#0f172a}
.streaming-card .stream-header{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#1e293b;border-bottom:1px solid #334155}
.streaming-card .stream-dot{width:6px;height:6px;border-radius:50%;background:#6ee7b7;animation:pulse-dot 1.2s ease-in-out infinite}
.streaming-card .stream-body{padding:10px 14px;font-size:.85rem;color:#e2e8f0;line-height:1.6;min-height:20px}
.tool-call-group{border:1px solid #374151;border-radius:10px;overflow:hidden;background:#0f172a}
.tc-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1e293b;cursor:pointer;user-select:none;transition:background .12s;border-bottom:1px solid #1e293b}
.tc-header:hover{background:#334155}
.tc-name-badge{font-size:.65rem;background:#334155;color:#93c5fd;border-radius:4px;padding:2px 6px;white-space:nowrap}
.tc-status-badge{font-size:.6rem;background:#064e3b;color:#6ee7b7;border-radius:999px;padding:1px 8px}
.tc-arrow{font-size:.6rem;color:#64748b;transition:transform .2s}
.tc-body{padding:10px 14px;font-size:.77rem;color:#cbd5e1;line-height:1.5;max-height:300px;overflow-y:auto;border-top:1px solid #1e293b;background:#0f172a}
.tc-body pre{background:#0f172a;border:1px solid #1e293b;border-radius:6px;padding:8px;font-size:.7rem;color:#e2e8f0;overflow-x:auto;margin:0}
.tc-body .tc-label{font-size:.7rem;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.download-card{display:flex;align-items:center;gap:12px;background:#111827;border:1px solid #374151;border-radius:12px;padding:12px 16px;margin:8px 0;animation:fadeSlideIn .3s ease-out;transition:all .15s}
.download-card:hover{border-color:#059669;background:#1a2030}
.download-icon{width:40px;height:40px;border-radius:10px;background:#064e3b;border:1px solid #065f46;display:flex;align-items:center;justify-content:center;color:#6ee7b7;font-size:1.1rem;flex-shrink:0}
.download-info{flex:1;min-width:0}
.download-filename{font-size:.85rem;font-weight:500;color:#f3f4f6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.download-desc{font-size:.7rem;color:#9ca3af;margin-top:2px}
.download-btn{display:inline-flex;align-items:center;gap:6px;background:#059669;color:white;border:none;border-radius:8px;padding:8px 14px;font-size:.75rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all .15s;flex-shrink:0}
.download-btn:hover{background:#047857;transform:scale(1.04)}
.download-btn:active{transform:scale(.97)}
.downloads-header{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#6ee7b7;margin:12px 0 4px 0;display:flex;align-items:center;gap:6px;font-weight:500}
.model-search-wrap{position:relative}
.model-dropdown{position:absolute;bottom:100%;left:0;right:0;background:#1f2937;border:1px solid #4b5563;border-radius:12px;max-height:240px;overflow-y:auto;z-index:100;display:none;margin-bottom:4px}
.model-dropdown.show{display:block}
.model-dropdown-item{padding:8px 14px;font-size:.8rem;cursor:pointer;border-bottom:1px solid #374151;transition:background .1s}
.model-dropdown-item:last-child{border:none}
.model-dropdown-item:hover,.model-dropdown-item.active{background:#374151;color:#6ee7b7}
.model-dropdown-item .model-provider{font-size:.65rem;color:#6b7280}
.model-dropdown-item .model-context{font-size:.65rem;color:#9ca3af;float:right}
.scroll-fab{position:absolute;bottom:100px;right:16px;width:44px;height:44px;border-radius:50%;background:#065f46;border:1px solid #059669;color:#6ee7b7;display:none;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.scroll-fab:hover,.scroll-fab:active{background:#047857;transform:scale(1.1)}
.scroll-fab.show{display:flex}
.empty-state .suggestion{background:#1f2937;border:1px solid #374151;border-radius:12px;padding:10px 16px;cursor:pointer;transition:all .15s;font-size:.85rem}
.empty-state .suggestion:hover,.empty-state .suggestion:active{background:#374151;border-color:#059669;color:#6ee7b7}
.cost-badge{font-size:.65rem;color:#9ca3af;background:#374151;border-radius:4px;padding:1px 6px}
.module-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:#111827;border:1px solid #374151;margin-bottom:4px;transition:all .15s}
.module-item:hover{border-color:#4b5563}
.module-item .mod-name{flex:1;font-size:.75rem;color:#d1d5db}
.module-item .mod-status{font-size:.55rem;text-transform:uppercase;letter-spacing:.05em}
.module-item .mod-toggle{width:28px;height:16px;border-radius:8px;background:#374151;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.module-item .mod-toggle.on{background:#059669}
.module-item .mod-toggle::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:white;transition:transform .2s}
.module-item .mod-toggle.on::after{transform:translateX(12px)}
.module-accordion-header{cursor:pointer;user-select:none}
.module-accordion-header:hover{color:#6ee7b7}
.accordion-arrow{transition:transform .3s ease;display:inline-block}
.accordion-arrow.open{transform:rotate(180deg)}
.module-accordion-body{overflow:hidden;transition:max-height .35s ease,opacity .25s ease;max-height:0;opacity:0}
.module-accordion-body.open{opacity:1}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:#1f2937;border:1px solid #374151;border-radius:20px;padding:24px;width:420px;max-width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.modal-box h2{font-size:1.1rem;font-weight:600;margin-bottom:16px;color:#f3f4f6}
.modal-close{float:right;cursor:pointer;color:#9ca3af;font-size:1.2rem}
.modal-close:hover{color:#f3f4f6}
.modal-box label{display:block;font-size:.85rem;margin-bottom:4px;margin-top:12px;color:#d1d5db}
.modal-box input,.modal-box textarea,.modal-box select{width:100%;background:#111827;border:1px solid #4b5563;border-radius:10px;padding:10px 14px;font-size:16px;color:#f3f4f6;outline:none}
.modal-box input:focus,.modal-box textarea:focus,.modal-box select:focus{border-color:#059669}
.modal-box textarea{resize:vertical;font-family:inherit}
.modal-box .btn{width:100%;background:#059669;border:none;border-radius:10px;padding:10px;font-size:.85rem;color:white;cursor:pointer;margin-top:12px;font-weight:500}
.modal-box .btn:hover{background:#047857}
.modal-box .btn-secondary{background:#374151}
.modal-box .btn-secondary:hover{background:#4b5563}
.settings-row{display:flex;align-items:center;gap:12px;margin-top:8px}
.settings-row input[type="range"]{flex:1;accent-color:#059669;height:6px;border-radius:3px;background:#374151;max-width:200px}
.settings-row .range-value{font-size:.85rem;color:#6ee7b7;min-width:30px;text-align:center;font-weight:500}
.settings-row .checkbox-label{display:flex;align-items:center;gap:6px;font-size:.8rem;color:#9ca3af;cursor:pointer}
.settings-row .checkbox-label input{width:auto;accent-color:#059669}
.sidebar{display:flex;flex-direction:column;flex-shrink:0;width:20rem;background:#111827;border-right:1px solid #374151}
.sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:49;display:none}
.sidebar-overlay.show{display:block}
.hamburger-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:#1f2937;border:1px solid #374151;color:#d1d5db;cursor:pointer;transition:background .15s;flex-shrink:0}
.hamburger-btn:hover,.hamburger-btn:active{background:#374151;color:#6ee7b7}

/* ===== SCRATCH PAD STYLES ===== */
.scratchpad-container{background:#0f172a;border-top:1px solid #374151;display:flex;flex-direction:column;max-height:40vh;min-height:0;transition:max-height .3s ease}
.scratchpad-container.collapsed{max-height:0!important;border-top:none;overflow:hidden}
.scratchpad-toggle{display:flex;align-items:center;gap:6px;padding:4px 16px;background:#0f172a;border-top:1px solid #374151;border-bottom:1px solid #374151;cursor:pointer;user-select:none;font-size:.7rem;color:#9ca3af;transition:all .12s}
.scratchpad-toggle:hover{background:#1e293b;color:#6ee7b7}
.scratchpad-toggle .sp-toggle-icon{transition:transform .3s ease;font-size:.55rem}
.scratchpad-toggle.open .sp-toggle-icon{transform:rotate(180deg)}
.scratchpad-tabbar{display:flex;align-items:center;gap:0;background:#1e293b;border-bottom:1px solid #334155;overflow-x:auto;flex-shrink:0;min-height:32px;padding:0 4px}
.scratchpad-tabbar::-webkit-scrollbar{height:2px}
.scratchpad-tabbar::-webkit-scrollbar-thumb{background:#4b5563;border-radius:2px}
.scratchpad-tab{display:flex;align-items:center;gap:6px;padding:5px 12px;font-size:.72rem;color:#9ca3af;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .12s;flex-shrink:0}
.scratchpad-tab:hover{color:#e2e8f0;background:#334155}
.scratchpad-tab.active{color:#6ee7b7;border-bottom-color:#6ee7b7;background:rgba(5,150,105,0.08)}
.scratchpad-tab .sp-tab-close{font-size:.5rem;padding:2px;border-radius:3px;color:#6b7280;transition:all .1s}
.scratchpad-tab .sp-tab-close:hover{color:#ef4444;background:#374151}
.scratchpad-tab .sp-tab-icon{font-size:.6rem;color:#6ee7b7}
.scratchpad-body{flex:1;overflow:hidden;position:relative;min-height:0}
.scratchpad-body .sp-no-files{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#4b5563;font-size:.75rem;gap:8px}
.scratchpad-body .sp-no-files i{font-size:1.5rem;color:#374151}
.scratchpad-code-view{display:none;height:100%;overflow:auto;background:#0f172a;position:relative}
.scratchpad-code-view.active{display:block}
.scratchpad-code-view .sp-code-header{display:flex;align-items:center;justify-content:space-between;padding:4px 12px;background:#1e293b;border-bottom:1px solid #334155;flex-shrink:0}
.scratchpad-code-view .sp-code-header .sp-file-info{font-size:.65rem;color:#9ca3af;display:flex;align-items:center;gap:8px}
.scratchpad-code-view .sp-code-header .sp-file-info .sp-line-count{color:#4b5563}
.scratchpad-code-view .sp-code-header .sp-actions{display:flex;gap:4px}
.scratchpad-code-view .sp-code-header .sp-actions button{background:#374151;border:none;color:#9ca3af;padding:3px 8px;border-radius:4px;font-size:.62rem;cursor:pointer;transition:all .1s}
.scratchpad-code-view .sp-code-header .sp-actions button:hover{background:#4b5563;color:#f3f4f6}
.scratchpad-code-view pre{display:flex;margin:0;padding:0;font-size:.75rem;line-height:1.6;min-height:100%}
.scratchpad-code-view pre .sp-line-nums{display:flex;flex-direction:column;padding:8px 8px 8px 12px;background:#0f172a;color:#4b5563;text-align:right;user-select:none;border-right:1px solid #1e293b;min-width:40px;flex-shrink:0;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.6;font-size:.75rem}
.scratchpad-code-view pre .sp-line-nums span{display:block}
.scratchpad-code-view pre .sp-code-content{padding:8px 14px;overflow-x:auto;white-space:pre;tab-size:2;color:#e2e8f0;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.6;font-size:.75rem;flex:1}
.scratchpad-code-view .sp-code-content .sp-line-highlight{background:rgba(5,150,105,0.12);display:block}
.scratchpad-code-view .sp-code-content .sp-line-added{background:rgba(5,150,105,0.08);display:block}
.scratchpad-code-view .sp-code-content .sp-line-removed{background:rgba(239,68,68,0.08);display:block}

/* Diff view inside scratch pad */
.sp-diff-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:#0f172a;overflow:auto;display:none;z-index:5}
.sp-diff-overlay.show{display:block}
.sp-diff-overlay .sp-diff-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#1e293b;border-bottom:1px solid #334155}
.sp-diff-overlay .sp-diff-header span{font-size:.68rem;color:#d1d5db}
.sp-diff-overlay .sp-diff-header button{background:#374151;border:none;color:#9ca3af;padding:3px 8px;border-radius:4px;font-size:.62rem;cursor:pointer}
.sp-diff-overlay .sp-diff-header button:hover{background:#4b5563;color:#f3f4f6}
.sp-diff-overlay pre{padding:8px 14px;margin:0;font-size:.72rem;line-height:1.5;white-space:pre;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
.sp-diff-overlay .sp-diff-ln-add{color:#6ee7b7}
.sp-diff-overlay .sp-diff-ln-rem{color:#f87171}
.sp-diff-overlay .sp-diff-ln-ctx{color:#9ca3af}
.sp-diff-overlay .sp-diff-sep{color:#4b5563;text-align:center;border-bottom:1px solid #1e293b;padding:2px 0}

@media(max-width:768px){
.scratchpad-container{max-height:35vh}
.scratchpad-tab{padding:4px 8px;font-size:.65rem}
.scratchpad-code-view pre .sp-line-nums{padding:4px 4px 4px 8px;min-width:30px;font-size:.7rem}
.scratchpad-code-view pre .sp-code-content{padding:4px 8px;font-size:.7rem}
.scratchpad-code-view .sp-code-header{padding:2px 8px}
.scratchpad-code-view .sp-code-header .sp-actions button{padding:2px 6px;font-size:.55rem}
}

@media(max-width:768px){
.sidebar{position:fixed;top:0;left:0;height:100vh;z-index:50;border-right:1px solid #374151;transform:translateX(-100%);transition:transform .3s ease}
.sidebar.open{transform:translateX(0)}.sidebar-overlay.show{display:block}.hamburger-btn{display:flex}.main-chat{margin-left:0}
.messages{padding:12px}.input-area{padding:8px 12px}.user-msg,.assistant-msg{max-width:92%!important;font-size:.92rem}
.user-msg,.assistant-msg{padding:10px 16px!important}.empty-state-suggestions{max-width:100%!important}.header-title{font-size:1.1rem}.header{padding:0 12px}
.scroll-fab{right:12px;bottom:80px;width:40px;height:40px}.modal-box{padding:20px;border-radius:16px;margin:8px}
.modal-box input,.modal-box textarea{font-size:16px}.msg-ts{font-size:.6rem}.step-entry{font-size:.7rem;padding:5px 10px}
.tc-header{padding:6px 10px}.tc-body{padding:8px 10px;font-size:.72rem}
.model-dropdown-item{font-size:.75rem;padding:10px 12px}.model-dropdown{max-height:200px}
.sidebar-header,.sidebar-actions{padding:12px}.sidebar-history,.sidebar-footer{padding:0 8px}.conv-item{padding:10px 12px!important}
textarea#userInput{font-size:16px;padding:12px 16px;min-height:48px}.send-btn,.cancel-btn{width:48px;height:48px;min-width:48px}.empty-state{padding:16px}
.empty-state h2{font-size:1rem}.empty-state p{font-size:.8rem}.cost-badge,.token-badge{font-size:.6rem}.kbd{font-size:.65rem;padding:1px 4px}.module-item .mod-name{font-size:.7rem}
}
@media(max-width:400px){
.user-msg,.assistant-msg{max-width:96%!important;font-size:.88rem}.user-msg,.assistant-msg{padding:8px 12px!important}
.messages{padding:8px}.input-area{padding:6px 8px}textarea#userInput{padding:10px 12px}
}
@media screen and (max-height:500px){.sidebar{overflow-y:auto}.modal-box{max-height:90vh}}
input,textarea,select{font-size:16px!important}
</style>
</head>
<body class="h-screen flex">

<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="settingsModal" class="modal-overlay">
<div class="modal-box">
<span class="modal-close" onclick="closeSettings()">×</span>
<h2><i class="fas fa-cog text-emerald-500 mr-2"></i>Settings</h2>
<label>OpenRouter API Key <span id="keyStatusModal" class="text-xs"><i class="fas fa-circle" style="color:#6b7280"></i></span></label>
<input id="apiKeyModal" type="password" placeholder="sk-or-..." onchange="syncApiKey()">
<label>System Prompt</label>
<textarea id="sysPromptModal" rows="4" placeholder="Optional system prompt..." onchange="saveSysPrompt()"></textarea>
<label>Max Steps (turn limit)</label>
<div class="settings-row">
  <input type="range" id="stepSlider" min="1" max="50" value="10" oninput="updateStepDisplay()">
  <span id="stepValue" class="range-value">10</span>
  <label class="checkbox-label"><input type="checkbox" id="unlimitedSteps" onchange="toggleUnlimitedSteps()"> Unlimited</label>
</div>
<button class="btn" onclick="saveSettings()">Save Settings</button>
<button class="btn btn-secondary" onclick="closeSettings()" style="margin-top:8px">Close</button>
</div>
</div>

<div id="sidebar" class="sidebar">
<div class="sidebar-header p-4 border-b border-gray-700 flex items-center justify-between">
<div><h1 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-seedling text-emerald-500"></i> ChatSeed</h1><p class="text-xs text-emerald-400 mt-1">v9 Scratch Pad</p></div>
<button id="sidebarCloseBtn" class="hamburger-btn" onclick="closeSidebar()" title="Close" style="display:none"><i class="fas fa-times"></i></button>
</div>
<div class="sidebar-actions p-4 space-y-2">
<button onclick="newChat()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-2xl font-medium flex items-center justify-center gap-2"><i class="fas fa-plus"></i> New Chat</button>
<button onclick="openSettings()" class="w-full bg-gray-700 hover:bg-gray-600 py-2 rounded-xl text-xs flex items-center justify-center gap-1"><i class="fas fa-cog"></i> Settings</button>
<button onclick="clearOldConversations()" class="w-full bg-gray-800 hover:bg-red-900 py-2 rounded-xl text-xs flex items-center justify-center gap-1 border border-gray-600 hover:border-red-500"><i class="fas fa-broom"></i> Clear Memory</button>
</div>
<div class="border-t border-gray-700">
<div class="flex items-center justify-between px-4 py-2 module-accordion-header" onclick="toggleModulesAccordion()">
<span class="text-xs uppercase tracking-widest text-gray-500"><i class="fas fa-puzzle-piece text-emerald-500 mr-1"></i> Modules <i id="modulesAccordionArrow" class="accordion-arrow fas fa-chevron-down" style="font-size:10px;margin-left:4px"></i></span>
<div class="flex items-center gap-2">
<span id="activeModuleCount" class="text-xs text-emerald-400 font-medium" style="font-size:.6rem">0 active</span>
<button onclick="event.stopPropagation(); reloadModules()" class="text-xs text-gray-500 hover:text-emerald-400" title="Reload"><i class="fas fa-sync"></i></button>
</div>
</div>
<div id="modulesAccordionBody" class="module-accordion-body" style="max-height:0"><div id="moduleList" class="px-4 pb-2 space-y-1"></div></div>
</div>
<div class="sidebar-history px-2 flex items-center justify-between mb-1 mt-2">
<span class="px-2 text-xs uppercase tracking-widest text-gray-500">Conversations</span>
<div class="flex items-center gap-2">
<span id="undoBtn" class="text-xs cursor-pointer hover:text-emerald-400" title="Undo last evolution write" onclick="undoLastWrite()" style="color: rgb(107, 114, 128);"><i class="fas fa-undo"></i></span>
<span class="text-xs text-gray-500"><span id="totalTokens">0</span> tok</span>
</div>
</div>
<div class="px-2"><input id="convSearch" class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-500 mb-1" type="text" placeholder="Search conversations..." oninput="renderChatHistory()"></div>

<div class="sidebar-footer px-4 pb-3 text-xs text-gray-500 text-center"><span class="kbd">Enter</span> send · <span class="kbd">Shift+Enter</span> newline · <span class="kbd">Esc</span> cancel</div>

<div class="model-search-wrap">
<input id="modelSearchInput" type="text" class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-500" placeholder="Search models..." autocomplete="off" onfocus="filterModelDropdown()" oninput="filterModelDropdown()" onblur="setTimeout(function(){closeModelDropdown()},200)" onkeydown="onModelKeydown(event)" data-model-id="">
<div id="modelDropdown" class="model-dropdown"></div>
</div>
</div>
</div>

  <div class="scratchpad-tabbar" id="scratchpadTabbar"></div>

<button id="sendBtn" onclick="sendMessage()" class="send-btn bg-emerald-600 hover:bg-emerald-700 w-12 h-12 rounded-3xl flex items-center justify-center self-end shrink-0"><i class="fas fa-paper-plane"></i></button>
<button id="cancelBtn" onclick="cancelStream()" class="cancel-btn bg-red-700 hover:bg-red-600 w-12 h-12 rounded-3xl flex items-center justify-center self-end shrink-0 hidden"><i class="fas fa-stop"></i></button>
</div>
</div>
</div>

<div id="toast" class="fixed bottom-6 right-6 bg-gray-800 border border-gray-600 rounded-2xl px-6 py-3 shadow-2xl z-50 hidden">Ready</div>

<script>
// ===== STATE =====
var API_KEY = "";
var conversations = [];
var currentChatId = null;
var AVAILABLE_MODELS = [];
var isProcessing = false;
var abortController = null;
var autoScroll = true;
var streamBubble = null;
var streamBodyEl = null;
var modelIndex = 0;
var selectedModelId = "";
var evolutionUndoStack = [];
var modelPricing = {};
var modulesAccordionOpen = false;
var MAX_STEPS = 10;
var MODULE_REGISTRY = {};
var MODULE_STATES = {};
var CORE_TOOLS = [];
var CLEAN_SOURCE_CACHE = null;
var MODULE_LOADED_FILES = {};
var LIVE_SOURCE = null;

// ===== INIT LOAD =====
try { API_KEY = localStorage.getItem("chatseed_api_key") || ""; } catch(e) {}
try { var saved = localStorage.getItem("chatseed_conversations"); if (saved) { var p = JSON.parse(saved); if (Array.isArray(p)) conversations = p; } } catch(e) {}
try { var sv = localStorage.getItem("chatseed_max_steps"); if (sv) MAX_STEPS = parseInt(sv) || 10; } catch(e) {}

(function captureCleanSource() {
  var raw = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  raw = raw.replace(/<div id="chatHistory"[^>]*>.*?<\/div><\/div><div class="sidebar-footer/, '<div id="chatHistory" class="flex-1 overflow-auto px-2 space-y-1"></div><div class="sidebar-footer');
  raw = raw.replace(/(<div id="messages"[^>]*>).*?(<\/div>)/, '$1$2');
  raw = raw.replace(/<style>[^<]*?--tw-border-spacing-x[^<]*?<\/style>\s*/gi, '');
  CLEAN_SOURCE_CACHE = raw;
  LIVE_SOURCE = raw;
})();

// ===== HELPERS =====
function stripBleedingCSS(html) {
  return html.replace(/<style>[^<]*?--tw-border-spacing-x[^<]*?<\/style>\s*/gi, '');
}

function getCurrentSource() {
  if (LIVE_SOURCE) return stripBleedingCSS(LIVE_SOURCE);
  if (CLEAN_SOURCE_CACHE) return stripBleedingCSS(CLEAN_SOURCE_CACHE);
  var raw = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  raw = stripBleedingCSS(raw);
  LIVE_SOURCE = raw;
  CLEAN_SOURCE_CACHE = raw;
  return LIVE_SOURCE;
}

function updateLiveSource(newCode) {
  var cleaned = stripBleedingCSS(newCode);
  LIVE_SOURCE = cleaned;
  CLEAN_SOURCE_CACHE = cleaned;
  ScratchPad.pushCode(cleaned, "chatseed-live.html", "Live working source");
}

function sanitizeHTML(str) {
  if (typeof DOMPurify !== "undefined") return DOMPurify.sanitize(str, {ALLOWED_TAGS:[],ALLOWED_ATTR:[]});
  var d = document.createElement("div"); d.textContent = str; return d.innerHTML;
}

function renderMarkdown(text) {
  if (!text) return "";
  try {
    var raw = marked.parse(text, {breaks:true, gfm:true});
    if (typeof DOMPurify !== "undefined") return DOMPurify.sanitize(raw);
    return raw;
  } catch(e) { return text.replace(/\n/g, "<br>"); }
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.remove("hidden");
  clearTimeout(t._timeout);
  t._timeout = setTimeout(function(){ t.classList.add("hidden"); }, 3500);
}

function scrollToBottom(smooth) {
  if (smooth === undefined) smooth = true;
  var c = document.getElementById("messages");
  c.scrollTop = c.scrollHeight;
}

function getTimeStr() {
  var d = new Date();
  return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

function updateAutoScroll() { autoScroll = document.getElementById("autoScrollToggle").checked; }

function getCurrentChat() {
  for (var i = 0; i < conversations.length; i++) if (conversations[i].id === currentChatId) return conversations[i];
  return null;
}

// ===== MEMORY MANAGEMENT (Quota-Safe) =====
var STORAGE_KEY = "chatseed_conversations";
var STORAGE_WARN_PCT = 80;
var STORAGE_CRIT_PCT = 92;
var MAX_CONVERSATIONS = 50;

function getStorageUsage() {
  var result = { used: 0, limit: 5242880, pct: 0 };
  try {
    var total = 0;
    for (var key in localStorage) {
      if (localStorage.hasOwnProperty(key)) {
        total += localStorage[key].length;
      }
    }
    result.used = total;
    result.pct = Math.min(100, Math.round((total / result.limit) * 100));
  } catch(e) {}
  return result;
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / 1048576).toFixed(1) + " MB";
}

function trimConversations(force) {
  if (!conversations || conversations.length === 0) return;
  conversations.sort(function(a, b) {
    var aLast = a.messages && a.messages.length ? new Date(a.messages[a.messages.length-1].timestamp || a.createdAt).getTime() : new Date(a.createdAt).getTime();
    var bLast = b.messages && b.messages.length ? new Date(b.messages[b.messages.length-1].timestamp || b.createdAt).getTime() : new Date(b.createdAt).getTime();
    return bLast - aLast;
  });
  for (var i = conversations.length - 1; i >= 1; i--) {
    if (!conversations[i].messages || conversations[i].messages.length === 0) {
      conversations.splice(i, 1);
    }
  }
  while (conversations.length > MAX_CONVERSATIONS) {
    conversations.pop();
  }
  if (force) {
    var now = Date.now();
    for (var i = conversations.length - 1; i >= 1; i--) {
      var chat = conversations[i];
      if (!chat.messages) continue;
      var chatAge = now - new Date(chat.createdAt || now).getTime();
      if (chatAge > 7 * 86400000 && chat.messages.length > 10) {
        chat.messages = chat.messages.slice(-10);
      }
    }
  }
}

function saveConversations() {
  var wrote = false;
  var trimmed = false;
  try {
    var usage = getStorageUsage();
    var json = JSON.stringify(conversations);
    if (usage.pct >= STORAGE_CRIT_PCT) {
      trimConversations(true);
      var newJson = JSON.stringify(conversations);
      if (newJson !== json) trimmed = true;
      json = newJson;
    } else if (usage.pct >= STORAGE_WARN_PCT) {
      trimConversations(false);
      var newJson = JSON.stringify(conversations);
      if (newJson !== json) trimmed = true;
      json = newJson;
    }
    localStorage.setItem(STORAGE_KEY, json);
    wrote = true;
    updateStorageIndicator();
    if (trimmed) showToast("Memory trimmed to free space");
  } catch(e) {
    console.warn("Save failed:", e.message);
  }
  if (wrote) return;

  try {
    var currentId = currentChatId;
    var keep = [];
    var savedCurrent = null;
    for (var i = 0; i < conversations.length; i++) {
      if (conversations[i].id === currentId) {
        savedCurrent = conversations[i];
        if (savedCurrent.messages && savedCurrent.messages.length > 30) {
          savedCurrent.messages = savedCurrent.messages.slice(-30);
        }
      } else if (keep.length < 5) {
        var c = conversations[i];
        if (c.messages && c.messages.length > 4) c.messages = c.messages.slice(-4);
        keep.push(c);
      }
    }
    var salvaged = [];
    if (savedCurrent) salvaged.push(savedCurrent);
    conversations = salvaged.concat(keep);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
    showToast("Memory emergency! Trimmed to essential chats only.");
    updateStorageIndicator();
    return;
  } catch(e2) {
    console.warn("Recovery 1 failed:", e2.message);
  }

  try {
    var current = getCurrentChat();
    if (current) {
      var minimal = [{id: current.id, title: current.title, model: current.model, messages: current.messages.slice(-20), createdAt: current.createdAt}];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(minimal));
      conversations = minimal;
      showToast("Storage critical! Only current chat saved.");
      updateStorageIndicator();
      return;
    }
  } catch(e3) {
    console.warn("Recovery 2 failed:", e3.message);
  }
  showToast("Storage full! Export your chats and clear history.");
}

function updateStorageIndicator() {
  var el = document.getElementById("storageIndicator");
  if (!el) return;
  var usage = getStorageUsage();
  var pct = usage.pct;
  var color = pct > 90 ? "text-red-400" : pct > 70 ? "text-yellow-400" : "text-emerald-400";
  var barColor = pct > 90 ? "bg-red-500" : pct > 70 ? "bg-yellow-500" : "bg-emerald-500";
  el.innerHTML = '<div class="flex items-center gap-2 text-xs" title="Storage: '+formatBytes(usage.used)+' / '+formatBytes(usage.limit)+'">' +
    '<div class="w-16 h-1.5 bg-gray-700 rounded-full overflow-hidden">' +
    '<div class="h-full '+barColor+' rounded-full" style="width:'+Math.min(pct,100)+'%"></div></div>' +
    '<span class="'+color+'">'+pct+'%</span></div>';
}

function clearOldConversations() {
  if (!confirm("Delete all conversations? This cannot be undone.")) return;
  var current = getCurrentChat();
  var keep = current ? [{id: current.id, title: current.title, model: current.model, messages: current.messages, createdAt: current.createdAt}] : [];
  conversations = keep;
  saveConversations();
  renderChatHistory();
  showToast("Old conversations cleared");
}

function addStorageIndicator() {
  var footer = document.querySelector(".sidebar-footer");
  if (!footer) return;
  var ind = document.createElement("div");
  ind.id = "storageIndicator";
  ind.className = "px-4 py-1";
  footer.parentNode.insertBefore(ind, footer);
  updateStorageIndicator();
}

// ===== UI STATE MANAGEMENT =====
function setProcessingUI(processing) {
  var sendBtn = document.getElementById("sendBtn");
  var cancelBtn = document.getElementById("cancelBtn");
  if (!sendBtn || !cancelBtn) return;
  if (processing) {
    sendBtn.classList.add("hidden");
    cancelBtn.classList.remove("hidden");
  } else {
    sendBtn.classList.remove("hidden");
    cancelBtn.classList.add("hidden");
  }
}

function updateTokenDisplay() {
  var chat = getCurrentChat();
  if (!chat) return;
  var total = 0;
  for (var i = 0; i < chat.messages.length; i++) {
    if (chat.messages[i].content) total += chat.messages[i].content.length;
  }
  var approx = Math.round(total / 4);
  document.getElementById("tokenUsage").textContent = "~" + approx + " tokens";
  document.getElementById("totalTokens").textContent = approx;
  updateCostDisplay(approx);
}

function updateCostDisplay(tokens) {
  var el = document.getElementById("costDisplay");
  if (!selectedModelId || !tokens || !modelPricing[selectedModelId]) { el.classList.add("hidden"); return; }
  var p = modelPricing[selectedModelId];
  var cost = (p.input||0) * tokens + (p.output||0) * (tokens * 0.3);
  el.textContent = "~$" + cost.toFixed(4);
  el.classList.remove("hidden");
}

function isMobile() { return window.innerWidth <= 768; }

function openSidebar() {
  if (!isMobile()) return;
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebarOverlay").classList.add("show");
  document.body.style.overflow = "hidden";
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("show");
  document.body.style.overflow = "";
}

function openSettings() {
  closeSidebar();
  document.getElementById("settingsModal").classList.add("show");
  document.getElementById("apiKeyModal").value = API_KEY;
  try { document.getElementById("sysPromptModal").value = localStorage.getItem("chatseed_sys_prompt") || ""; } catch(e) {}
  var s = document.getElementById("stepSlider");
  s.value = MAX_STEPS >= 999 ? 50 : MAX_STEPS;
  document.getElementById("stepValue").textContent = MAX_STEPS >= 999 ? "\u221e" : MAX_STEPS;
  document.getElementById("unlimitedSteps").checked = (MAX_STEPS >= 999);
  updateKeyStatusModal();
}
function closeSettings() { document.getElementById("settingsModal").classList.remove("show"); }

function syncApiKey() {
  API_KEY = document.getElementById("apiKeyModal").value.trim();
  try { localStorage.setItem("chatseed_api_key", API_KEY); } catch(e) {}
  updateKeyStatusModal();
}
function saveSysPrompt() {
  try { localStorage.setItem("chatseed_sys_prompt", document.getElementById("sysPromptModal").value.trim()); } catch(e) {}
}
function updateStepDisplay() {
  var val = parseInt(document.getElementById("stepSlider").value);
  document.getElementById("stepValue").textContent = val;
  document.getElementById("unlimitedSteps").checked = false;
  MAX_STEPS = val;
  try { localStorage.setItem("chatseed_max_steps", MAX_STEPS); } catch(e) {}
}
function toggleUnlimitedSteps() {
  if (document.getElementById("unlimitedSteps").checked) { MAX_STEPS = 999; document.getElementById("stepSlider").value = 999; document.getElementById("stepValue").textContent = "\u221e"; }
  else { MAX_STEPS = 10; document.getElementById("stepSlider").value = 10; document.getElementById("stepValue").textContent = "10"; }
  try { localStorage.setItem("chatseed_max_steps", MAX_STEPS); } catch(e) {}
}
function saveSettings() { syncApiKey(); saveSysPrompt(); closeSettings(); showToast("Settings saved"); }
function updateKeyStatusModal() {
  var el = document.getElementById("keyStatusModal");
  if (API_KEY && API_KEY.indexOf("sk-or-") === 0) el.innerHTML = '<i class="fas fa-circle" style="color:#6ee7b7"></i>';
  else if (API_KEY) el.innerHTML = '<i class="fas fa-circle" style="color:#facc15"></i>';
  else el.innerHTML = '<i class="fas fa-circle" style="color:#6b7280"></i>';
}
function getSystemPrompt() { try { return localStorage.getItem("chatseed_sys_prompt") || ""; } catch(e) { return ""; } }

// ===== MODEL DROPDOWN =====
function filterModelDropdown() {
  var input = document.getElementById("modelSearchInput");
  var dd = document.getElementById("modelDropdown");
  var q = input.value.toLowerCase().trim();
  var filtered = [];
  for (var i = 0; i < AVAILABLE_MODELS.length; i++) {
    var m = AVAILABLE_MODELS[i];
    if (!q || m.id.toLowerCase().indexOf(q) !== -1 || m.name.toLowerCase().indexOf(q) !== -1) filtered.push(m);
  }
  var html = "";
  var count = Math.min(filtered.length, 100);
  for (var i = 0; i < count; i++) {
    var m = filtered[i], prov = (m.provider && m.provider.name) || m.id.split("/")[0] || "?";
    var ctx = m.context_length ? Math.round(m.context_length/1000)+"k" : "?";
    html += '<div class="model-dropdown-item'+(i===0?' active':'')+'" data-model-id="'+m.id+'" onclick="selectModelFromDropdown(\''+m.id+'\')"><div>'+m.name+' <span class="model-context">'+ctx+'</span></div><div class="model-provider">'+prov+'</div></div>';
  }
  dd.innerHTML = html||'<div class="model-dropdown-item text-gray-500">No models found</div>';
  dd.classList.add("show");
  modelIndex = 0;
}
function closeModelDropdown() { document.getElementById("modelDropdown").classList.remove("show"); }
function onModelKeydown(e) {
  var dd = document.getElementById("modelDropdown");
  var items = dd.querySelectorAll(".model-dropdown-item");
  if (!dd.classList.contains("show")) return;
  if (e.key === "ArrowDown") { e.preventDefault(); modelIndex = Math.min(modelIndex+1, items.length-1); highlightModel(items); }
  else if (e.key === "ArrowUp") { e.preventDefault(); modelIndex = Math.max(modelIndex-1, 0); highlightModel(items); }
  else if (e.key === "Enter") { e.preventDefault(); if (items[modelIndex] && items[modelIndex].dataset.modelId) selectModelFromDropdown(items[modelIndex].dataset.modelId); }
  else if (e.key === "Escape") closeModelDropdown();
}
function highlightModel(items) {
  for (var i = 0; i < items.length; i++) items[i].classList.toggle("active", i === modelIndex);
  if (items[modelIndex]) items[modelIndex].scrollIntoView({block:"nearest"});
}
function selectModelFromDropdown(id) {
  var model = null;
  for (var i = 0; i < AVAILABLE_MODELS.length; i++) if (AVAILABLE_MODELS[i].id === id) { model = AVAILABLE_MODELS[i]; break; }
  if (!model) return;
  var input = document.getElementById("modelSearchInput");
  input.value = model.name;
  input.dataset.modelId = id;
  selectedModelId = id;
  closeModelDropdown();
  document.getElementById("currentModelHeader").textContent = model.name;
  var chat = getCurrentChat();
  if (chat) { chat.model = id; saveConversations(); }
  updateTokenDisplay();
}

// ===== CHAT MANAGEMENT =====
function newChat() {
  closeSidebar();
  if (currentChatId) {
    var current = getCurrentChat();
    if (current && current.messages && current.messages.length > 0) saveConversations();
  }
  var chat = {id:"chat_"+Date.now(), title:"New Chat", model:selectedModelId||"", messages:[], createdAt:new Date().toISOString()};
  conversations.unshift(chat);
  saveConversations();
  loadChat(chat.id);
}

function loadChat(id) {
  if (id === currentChatId) return;
  if (currentChatId) saveConversations();
  currentChatId = id;
  closeSidebar();
  var chat = getCurrentChat();
  if (!chat) return;
  if (chat.model) {
    var found = null;
    for (var i = 0; i < AVAILABLE_MODELS.length; i++) if (AVAILABLE_MODELS[i].id === chat.model) { found = AVAILABLE_MODELS[i]; break; }
    var input = document.getElementById("modelSearchInput");
    if (found) { input.value = found.name; input.dataset.modelId = found.id; selectedModelId = found.id; document.getElementById("currentModelHeader").textContent = found.name; }
    else { input.value = chat.model; input.dataset.modelId = chat.model; selectedModelId = chat.model; document.getElementById("currentModelHeader").textContent = chat.model; }
  }
  if (!isProcessing) setProcessingUI(false);
  renderMessages(chat.messages);
  renderChatHistory();
  updateTokenDisplay();
  document.getElementById("scrollFab").classList.remove("show");
}

function renderChatHistory() {
  var container = document.getElementById("chatHistory");
  var qInput = document.getElementById("convSearch");
  var q = qInput ? qInput.value.toLowerCase().trim() : "";
  var filtered = [];
  for (var i = 0; i < conversations.length; i++) {
    var c = conversations[i];
    if (!q) { filtered.push(c); continue; }
    if (c.title.toLowerCase().indexOf(q) !== -1) { filtered.push(c); continue; }
    var found = false;
    for (var j = 0; j < c.messages.length; j++) { if (c.messages[j].content && c.messages[j].content.toLowerCase().indexOf(q) !== -1) { found = true; break; } }
    if (found) filtered.push(c);
  }
  if (filtered.length === 0) { container.innerHTML = '<div class="text-xs text-gray-500 text-center py-4">No conversations found</div>'; return; }
  var html = "";
  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    html += '<div class="conv-item px-4 py-3 rounded-2xl cursor-pointer hover:bg-gray-800" onclick="loadChat(\''+c.id+'\')"><div class="line-clamp-1 text-sm">'+sanitizeHTML(c.title)+'</div><div class="text-xs text-gray-500">'+new Date(c.createdAt).toLocaleDateString()+'</div></div>';
  }
  container.innerHTML = html;
}

function cancelStream() {
  if (abortController) {
    abortController.abort();
    showToast("Canceled");
  }
}

function deleteCurrentChat() {
  if (!currentChatId || !confirm("Delete this conversation?")) return;
  var nu = [];
  for (var i = 0; i < conversations.length; i++) if (conversations[i].id !== currentChatId) nu.push(conversations[i]);
  conversations = nu;
  saveConversations();
  currentChatId = null;

    if (msg.timestamp) { var ts = document.createElement("div"); ts.className = "msg-ts"; ts.textContent = msg.timestamp; b.appendChild(ts); }
    w.appendChild(b);

  }
  var isUser = msg.role === "user";

  var w = document.createElement("div");

      var tid2 = "tc_"+Date.now()+"_"+i+"_"+Math.random().toString(36).substr(2,5);
      html += '<div class="tc-header" onclick="toggleToolDetail(\''+tid2+'\')"><i class="fas fa-cog fa-fw" style="font-size:0.75rem;color:#6ee7b7"></i><span class="tc-name-badge">'+sanitizeHTML(toolName)+'</span><span style="flex:1;font-size:0.75rem;color:#e2e8f0;font-weight:500">'+sanitizeHTML(label)+'</span><span class="tc-status-badge">pending</span><i class="fas fa-chevron-down tc-arrow" id="'+tid2+'_arrow"></i></div><div id="'+tid2+'" class="tc-body">';
      if (detail) html += '<div class="tc-label">Description</div><div style="white-space:pre-wrap;margin-bottom:8px">'+sanitizeHTML(detail)+'</div>';
      html += '<div class="tc-label">Arguments</div><pre>'+sanitizeHTML(JSON.stringify(toolArgs,null,2))+'</pre></div>';
    }

}

// ===== SCRATCH PAD ENGINE =====
var ScratchPad = {
  _files: {},
  _order: [],
  _active: null,
  _visible: false,
  
  addFile: function(code, filename, description) {
    if (!filename) filename = "untitled.txt";
    var isNew = !this._files[filename];
    var prevCode = this._files[filename] ? this._files[filename].code : null;
    this._files[filename] = {
      code: code,
      description: description || "",
      addedAt: isNew ? Date.now() : this._files[filename].addedAt,
      updatedAt: Date.now(),
      prevCode: prevCode
    };
    if (isNew) this._order.push(filename);
    else if (this._order.indexOf(filename) === -1) this._order.push(filename);
    this._active = filename;
    this.show();
    this.render();
    return filename;
  },
  
  removeFile: function(filename) {
    if (!this._files[filename]) return;
    delete this._files[filename];
    var idx = this._order.indexOf(filename);
    if (idx !== -1) this._order.splice(idx, 1);
    if (this._active === filename) {
      this._active = this._order.length > 0 ? this._order[this._order.length - 1] : null;
    }
    if (this._order.length === 0) this.hide();
    else this.render();
  },
  
  setActive: function(filename) {
    if (this._files[filename]) {
      this._active = filename;
      this.render();
    }
  },
  
  updateFile: function(code, filename, description) {
    if (!filename || !this._files[filename]) {
      return this.addFile(code, filename, description);
    }
    this._files[filename].prevCode = this._files[filename].code;
    this._files[filename].code = code;
    if (description) this._files[filename].description = description;
    this._files[filename].updatedAt = Date.now();
    this._active = filename;
    this.show();
    this.render();
  },
  
  pushCode: function(code, filename, description) {
    return this.addFile(code, filename, description);
  },
  
  toggle: function() {
    if (this._visible) this.hide();
    else this.show();
  },
  
  show: function() {
    if (this._order.length === 0) return;
    this._visible = true;
    var wrapper = document.getElementById("scratchpadWrapper");
    var toggle = document.getElementById("scratchpadToggle");
    if (wrapper) { wrapper.style.display = "flex"; setTimeout(function(){ wrapper.classList.remove("collapsed"); }, 10); }
    if (toggle) { toggle.classList.add("open"); }
  },
  
  hide: function() {
    this._visible = false;
    var wrapper = document.getElementById("scratchpadWrapper");
    var toggle = document.getElementById("scratchpadToggle");
    if (wrapper) wrapper.classList.add("collapsed");
    if (toggle) toggle.classList.remove("open");
  },
  
  render: function() {
    var tabbar = document.getElementById("scratchpadTabbar");
    var body = document.getElementById("scratchpadBody");
    var noFiles = document.getElementById("spNoFiles");
    var wrapper = document.getElementById("scratchpadWrapper");
    var toggle = document.getElementById("scratchpadToggle");
    var countLabel = document.getElementById("scratchpadFileCount");
    var toggleLabel = document.getElementById("scratchpadToggleLabel");
    if (!tabbar || !body) return;
    if (this._order.length === 0) {
      if (wrapper) wrapper.style.display = "none";
      if (toggle) toggle.style.display = "none";
      if (noFiles) noFiles.style.display = "flex";
      return;
    }
    if (toggle) toggle.style.display = "flex";
    if (wrapper) wrapper.style.display = "flex";
    if (countLabel) countLabel.textContent = this._order.length + " file" + (this._order.length !== 1 ? "s" : "");
    if (toggleLabel) toggleLabel.textContent = "Scratch Pad";
    if (noFiles) noFiles.style.display = "none";
    var tabHtml = "";
    for (var i = 0; i < this._order.length; i++) {
      var fn = this._order[i];
      var f = this._files[fn];
      if (!f) continue;
      var isActive = fn === this._active;
      var ext = fn.indexOf(".") !== -1 ? fn.split(".").pop().toLowerCase() : "";
      var icon = "fa-file-code";
      if (ext === "html" || ext === "htm") icon = "fa-file-code";
      else if (ext === "js") icon = "fa-file-js";
      else if (ext === "css") icon = "fa-file-css";
      else if (ext === "json") icon = "fa-file-json";
      else if (ext === "md") icon = "fa-file-lines";
      else if (ext === "py") icon = "fa-file-python";
      else if (ext === "txt") icon = "fa-file-lines";
      else if (ext === "svg") icon = "fa-file-image";
      tabHtml += '<div class="scratchpad-tab'+(isActive?' active':'')+'" onclick="ScratchPad.setActive(\''+fn.replace(/'/g,"\\'")+'\')" title="'+fn+'"><i class="fas '+icon+' sp-tab-icon"></i><span>'+fn+'</span><span class="sp-tab-close" onclick="event.stopPropagation();ScratchPad.removeFile(\''+fn.replace(/'/g,"\\'")+'\')" title="Close">✕</span></div>';
    }
    tabbar.innerHTML = tabHtml;
    var activeFile = this._files[this._active];
    if (!activeFile) {
      body.innerHTML = '<div class="sp-no-files" style="display:flex"><i class="fas fa-file"></i><span>Select a file</span></div>';
      return;
    }
    var code = activeFile.code || "";
    var lines = code.split("\n");
    var lineCount = lines.length;
    var displayFilename = this._active;
    var lineNumsHtml = "";
    for (var i = 0; i < lineCount; i++) {
      lineNumsHtml += '<span>' + (i + 1) + '</span>';
    }
    var codeHtml = "";
    var displayCode = code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    var codeLines = displayCode.split("\n");
    var showDiff = activeFile.prevCode && activeFile.prevCode !== activeFile.code;
    for (var i = 0; i < codeLines.length; i++) {
      var lineClass = "";
      var line = codeLines[i];
      if (showDiff && activeFile.prevCode) {
        var prevLines = activeFile.prevCode.split("\n");
        if (i >= prevLines.length) {
          lineClass = ' class="sp-line-added"';
        } else if (prevLines[i] !== line) {
          lineClass = ' class="sp-line-highlight"';
        }
      }
      codeHtml += '<span' + lineClass + '>' + line + '\n</span>';
    }
    var codeViewHtml = '<div class="sp-code-view-inner" style="display:flex;flex-direction:column;height:100%">';
    codeViewHtml += '<div class="sp-code-header"><div class="sp-file-info"><span style="color:#6ee7b7">' + displayFilename + '</span><span class="sp-line-count">' + lineCount + ' lines</span>' + (activeFile.description ? '<span style="color:#4b5563">| ' + activeFile.description.substring(0, 60) + '</span>' : '') + '</div><div class="sp-actions">';
    if (showDiff) {
      codeViewHtml += '<button onclick="ScratchPad.showDiff(\'' + displayFilename.replace(/'/g,"\\'") + '\')" title="View diff"><i class="fas fa-code-compare"></i> Diff</button>';
    }
    codeViewHtml += '<button onclick="ScratchPad.downloadFile(\'' + displayFilename.replace(/'/g,"\\'") + '\')" title="Download"><i class="fas fa-download"></i></button>';
    codeViewHtml += '<button onclick="ScratchPad.copyFile(\'' + displayFilename.replace(/'/g,"\\'") + '\')" title="Copy"><i class="fas fa-copy"></i></button>';
    codeViewHtml += '<button onclick="ScratchPad.removeFile(\'' + displayFilename.replace(/'/g,"\\'") + '\')" title="Close" style="color:#f87171"><i class="fas fa-times"></i></button>';
    codeViewHtml += '</div></div>';
    codeViewHtml += '<div style="flex:1;overflow:auto;position:relative">';
    codeViewHtml += '<pre><span class="sp-line-nums">' + lineNumsHtml + '</span><span class="sp-code-content">' + codeHtml + '</span></pre>';
    codeViewHtml += '<div id="spDiffView_' + displayFilename.replace(/[^a-z0-9]/gi,"_") + '" class="sp-diff-overlay"></div>';
    codeViewHtml += '</div></div>';
    body.innerHTML = codeViewHtml;
  },
  
  showDiff: function(filename) {
    var f = this._files[filename];
    if (!f || !f.prevCode) return;
    var diffId = "spDiffView_" + filename.replace(/[^a-z0-9]/gi,"_");
    var el = document.getElementById(diffId);
    if (!el) return;
    if (el.classList.contains("show")) {
      el.classList.remove("show");
      return;
    }
    var oldLines = f.prevCode.split("\n");
    var newLines = f.code.split("\n");
    var diffHtml = '<div class="sp-diff-header"><span><i class="fas fa-code-compare" style="color:#6ee7b7"></i> Diff: ' + filename + '</span><button onclick="document.getElementById(\'' + diffId + '\').classList.remove(\'show\')">✕ Close</button></div><pre>';
    var maxLen = Math.max(oldLines.length, newLines.length);
    for (var i = 0; i < maxLen; i++) {
      if (i < oldLines.length && i < newLines.length) {
        if (oldLines[i] !== newLines[i]) {
          diffHtml += '<span class="sp-diff-ln-rem">- ' + oldLines[i].replace(/&/g,"&amp;").replace(/</g,"&lt;") + '</span>\n';
          diffHtml += '<span class="sp-diff-ln-add">+ ' + newLines[i].replace(/&/g,"&amp;").replace(/</g,"&lt;") + '</span>\n';
        } else {
          diffHtml += '<span class="sp-diff-ln-ctx">  ' + oldLines[i].replace(/&/g,"&amp;").replace(/</g,"&lt;") + '</span>\n';
        }
      } else if (i < oldLines.length) {
        diffHtml += '<span class="sp-diff-ln-rem">- ' + oldLines[i].replace(/&/g,"&amp;").replace(/</g,"&lt;") + '</span>\n';
      } else if (i < newLines.length) {
        diffHtml += '<span class="sp-diff-ln-add">+ ' + newLines[i].replace(/&/g,"&amp;").replace(/</g,"&lt;") + '</span>\n';
      }
    }
    diffHtml += '</pre>';
    el.innerHTML = diffHtml;
    el.classList.add("show");
  },
  
  downloadFile: function(filename) {
    var f = this._files[filename];
    if (!f) return;
    var blob = new Blob([f.code], {type:"text/plain;charset=utf-8"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  },
  
  copyFile: function(filename) {
    var f = this._files[filename];
    if (!f) return;
    navigator.clipboard.writeText(f.code).then(function(){
      showToast("Copied: " + filename);
    });
  }
};

// ===== LINE EDITOR =====
var LineEditor = {
  read: function(s,e,c) {
    var src = getCurrentSource(), lines = src.split("\n"), total = lines.length;
    var start = (s!==undefined&&s!==null)?Math.max(1,parseInt(s)):1, end = (e!==undefined&&e!==null)?Math.min(total,parseInt(e)):total;
    if (start && !end) end = start;
    var selected = lines.slice(start-1, end);
    var r = [];
    if (c) {
      r.push("Source ("+total+" lines)");
      if (start > 1) r.push("  ... (lines 1-"+(start-1)+" hidden)");
      for (var i = 0; i < selected.length; i++) r.push(" "+(start+i).toString().padStart(4," ")+" | "+selected[i]);
      if (end < total) r.push("  ... (lines "+(end+1)+"-"+total+" hidden)");
    } else {
      r.push("Lines "+start+"-"+end+" of "+total);
      for (var i = 0; i < selected.length; i++) r.push((start+i).toString().padStart(4," ")+" | "+selected[i]);
    }
    return r.join("\n");
  },
  edit: function(s,e,c) {
    var src = getCurrentSource(), lines = src.split("\n"), total = lines.length;
    var start = Math.max(1,parseInt(s)), end = Math.min(total,parseInt(e));
    if (start > end) return null;
    var ins = c.split("\n");
    var newCode = lines.slice(0,start-1).concat(ins).concat(lines.slice(end)).join("\n");
    updateLiveSource(newCode);
    return {newCode: newCode};
  },
  insert: function(n,c) {
    var lines = getCurrentSource().split("\n");
    var ln = Math.min(Math.max(1,parseInt(n)), lines.length+1);
    var ins = c.split("\n");
    var newCode = lines.slice(0,ln-1).concat(ins).concat(lines.slice(ln-1)).join("\n");
    updateLiveSource(newCode);
    return {newCode: newCode};
  },
  del: function(s,e) {
    var lines = getCurrentSource().split("\n"), total = lines.length;
    var start = Math.max(1,parseInt(s)), end = Math.min(total,parseInt(e));
    if (start > end) return null;
    var newCode = lines.slice(0,start-1).concat(lines.slice(end)).join("\n");
    updateLiveSource(newCode);
    return {newCode: newCode};
  },
  append: function(c) { 
    var lines = getCurrentSource().split("\n");
    var newCode = lines.concat(c.split("\n")).join("\n");
    updateLiveSource(newCode);
    return {newCode: newCode}; 
  },
  search: function(p,r) {
    var lines = getCurrentSource().split("\n"), res = [];
    try { var re = r ? new RegExp(p) : new RegExp(p.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i"); for (var i = 0; i < lines.length; i++) if (re.test(lines[i])) res.push({line:i+1,text:lines[i]}); } catch(e) { return null; }
    return res;
  }
};

  if (action === "search_code") { var res = LineEditor.search(args.pattern, args.is_regex); if (res === null) return "Invalid pattern"; if (!res.length) return "No matches for: `"+args.pattern+"`"; var msg = "## Search results for: `"+args.pattern+"`\n\nFound "+res.length+" match"+(res.length!==1?"es":"")+":\n\n"; for (var i = 0; i < res.length; i++) msg += "`"+(""+res[i].line).padStart(4," ")+"` | "+res[i].text.replace(/\t/g,"  ")+"\n"; return msg; }
  if (action === "read") {

  }
  return null;
}

var ModuleSystem = {
  register: function(id, api) {
    if (MODULE_REGISTRY[id]) return;
    MODULE_REGISTRY[id] = api;
    MODULE_STATES[id] = { enabled: true, loaded: true, status: "active" };
    if (api.tools) api.tools.forEach(function(t){ t._moduleId = id; });
    renderModuleList();
    rebuildCoreTools();
    if (api.hooks && api.hooks.onInit) try { api.hooks.onInit(); } catch(e) {}
  },
  handleToolCall: async function(tn, args, tcid) {
    for (var id in MODULE_REGISTRY) {
      var mod = MODULE_REGISTRY[id];
      if (!MODULE_STATES[id] || !MODULE_STATES[id].enabled) continue;
      if (mod.handleToolCall && typeof mod.handleToolCall === "function") {
        var result = await mod.handleToolCall(tn, args, tcid);
        if (result !== undefined && result !== null) return result;
      }
    }
    return null;
  },
  getToolDescriptions: function() {
    var lines = [];
    for (var id in MODULE_REGISTRY) {
      var mod = MODULE_REGISTRY[id];
      if (!MODULE_STATES[id] || !MODULE_STATES[id].enabled) continue;
      if (mod.description) lines.push("- **"+mod.name+"**: "+mod.description);
      if (mod.tools) for (var i = 0; i < mod.tools.length; i++) { var t = mod.tools[i]; if (t.function && t.function.description) lines.push("  - `"+t.function.name+"`: "+t.function.description); }
    }
    return lines.join("\n");
  },
  toggleModule: function(id) {
    if (!MODULE_STATES[id]) return;
    MODULE_STATES[id].enabled = !MODULE_STATES[id].enabled;
    MODULE_STATES[id].status = MODULE_STATES[id].enabled ? "active" : "disabled";
    renderModuleList();
    rebuildCoreTools();
    updateActiveModuleCount();
    showToast((MODULE_STATES[id].enabled?"Enabled":"Disabled")+": "+(MODULE_REGISTRY[id].name||id));
  }
};

function rebuildCoreTools() {
  CORE_TOOLS = [SELF_EVOLUTION_TOOL];
  for (var id in MODULE_REGISTRY) {
    var mod = MODULE_REGISTRY[id];
    if (!MODULE_STATES[id] || !MODULE_STATES[id].enabled) continue;
    if (mod.tools) CORE_TOOLS = CORE_TOOLS.concat(mod.tools);
  }
}

// ===== EXTERNAL MODULE LOADER (fetches manifest from ./modules/modules_manifest.js) =====
// External modules with the same ID as a hardcoded fallback will OVERWRITE it.
async function loadExternalModules() {
  try {
    // Load the external manifest via script tag
    await new Promise(function(resolve, reject) {
      var s = document.createElement('script');
      s.src = './modules/modules_manifest.js';
      s.async = false;
      s.onload = resolve;
      s.onerror = reject;
      document.body.appendChild(s);
    });
    
    var manifest = window.__CHATSEED_MODULES_MANIFEST;
    if (!manifest || !manifest.modules || !manifest.modules.length) {
      console.warn('External manifest empty or missing');
      loadFallbackModules();
      return;
    }
    
    var mods = manifest.modules;
    var loaded = 0;
    
    // Before loading external modules, delete any fallback with the same ID
    // so the external module can register itself (since register() blocks duplicates)
    for (var i = 0; i < mods.length; i++) {
      var id = mods[i].id;
      if (MODULE_REGISTRY[id] && MODULE_LOADED_FILES[id + '__fallback']) {
        delete MODULE_REGISTRY[id];
        delete MODULE_STATES[id];
      }
    }
    
    for (var i = 0; i < mods.length; i++) {
      var info = mods[i];
      if (MODULE_LOADED_FILES[info.id]) continue;
      var ok = await loadSingleModule(info);
      if (ok) loaded++;
    }
    
    renderModuleList();
    updateActiveModuleCount();
    if (loaded > 0) showToast('Loaded ' + loaded + ' modules from ./modules/');
    else loadFallbackModules();
  } catch(e) {
    console.warn('Module manifest not available:', e.message);
    showToast('No ./modules/modules_manifest.js found. Using built-in fallback.');
    loadFallbackModules();
  }
}

function loadSingleModule(info) {
  return new Promise(function(resolve) {
    try {
      var script = document.createElement('script');
      script.src = './modules/' + info.file;
      script.async = false;
      script.setAttribute('data-module', info.id);
      script.onload = function() {
        MODULE_LOADED_FILES[info.id] = true;
        resolve(true);
      };
      script.onerror = function() {
        console.warn('Failed to load module ' + info.id + ' (' + info.file + ')');
        resolve(false);
      };
      document.body.appendChild(script);
    } catch(e) {
      console.warn('Error loading module ' + info.id + ':', e.message);
      resolve(false);
    }
  });
}

function loadFallbackModules() {
  // ===== FALLBACK: 4 built-in modules (hardcoded) =====
  // These act as defaults when no external ./modules/modules_manifest.js is found.
  // External modules with the same ID can overwrite these.
  
  var FALLBACKS = {};
// ===============================================================
  // HOT RELOAD: Overwrite search-web module in MODULE_REGISTRY
  // ===============================================================
  if (MODULE_REGISTRY["search-web"]) {
    delete MODULE_REGISTRY["search-web"];
    delete MODULE_STATES["search-web"];
  }

  // 1. Web Search (Multi-Engine with fallbacks)
  FALLBACKS["search-web"] = {
    register: function(MS) {
      (function(MS){
        MS.register("search-web", {
          name: "Web Search",
          description: "Search the internet for current information. Multiple search strategies: DuckDuckGo, Wikipedia, Reddit, and more (free, no API key).",
          tools: [{
            type: "function",
            function: {
              name: "search_web",
              description: "Search the internet. Returns titles, snippets, and URLs from multiple sources.",
              parameters: {
                type: "object",
                properties: {
                  query: { type: "string", description: "Search query" },
                  max_results: { type: "number", description: "Max results (1-10)", default: 5 },
                  source: { type: "string", enum: ["auto", "web", "wikipedia", "news", "reddit"], description: "Source to search. 'auto' tries multiple sources.", default: "auto" }
                },
                required: ["query"]
              }
            }
          }],
          handleToolCall: async function(tn, args) {
            if (tn !== "search_web") return null;
            try {
              var q = args.query;
              var mx = Math.min(Math.max(parseInt(args.max_results) || 5, 1), 10);
              var source = args.source || "auto";
              var allResults = [];

              // ===============================================================
              // STRATEGY 1: Wikipedia API (excellent for knowledge queries, CORS-friendly)
              // ===============================================================
              if (source === "auto" || source === "web" || source === "wikipedia") {
                try {
                  var wikiUrl = "https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=" + encodeURIComponent(q) + "&format=json&srlimit=" + mx + "&origin=*";
                  var wr = await fetch(wikiUrl);
                  if (wr.ok) {
                    var wd = await wr.json();
                    if (wd.query && wd.query.search) {
                      for (var i = 0; i < wd.query.search.length; i++) {
                        var s = wd.query.search[i];
                        allResults.push({
                          title: s.title,
                          snippet: s.snippet.replace(/<\/?[^>]+(>|$)/g, ""),
                          url: "https://en.wikipedia.org/wiki/" + encodeURIComponent(s.title.replace(/ /g, "_")),
                          source: "Wikipedia"
                        });
                      }
                    }
                  }
                } catch(e) {}
              }

              // ===============================================================
              // STRATEGY 2: DuckDuckGo Instant Answer API (definitions, summaries, calculations)
              // ===============================================================
              if (source === "auto" || source === "web") {
                try {
                  var ddgUrl = "https://api.duckduckgo.com/?q=" + encodeURIComponent(q) + "&format=json&no_html=1&skip_disambig=1&t=chatseed";
                  var dr = await fetch(ddgUrl);
                  if (dr.ok) {
                    var dd = await dr.json();

                    // Abstract/Infobox (Wikipedia summary)
                    if (dd.AbstractText) {
                      allResults.push({
                        title: dd.Heading || "About",
                        snippet: dd.AbstractText,
                        url: dd.AbstractURL || "",
                        source: "DuckDuckGo"
                      });
                    }

                    // Definition
                    if (dd.Definition && dd.Definition !== "" && dd.Definition !== dd.AbstractText) {
                      allResults.push({
                        title: dd.DefinitionSource ? "Definition (" + dd.DefinitionSource + ")" : "Definition",
                        snippet: dd.Definition,
                        url: "",
                        source: "DuckDuckGo"
                      });
                    }

                    // Answer (calculations, conversions, etc.)
                    if (dd.Answer && dd.AnswerType) {
                      allResults.push({
                        title: dd.AnswerType.charAt(0).toUpperCase() + dd.AnswerType.slice(1),
                        snippet: dd.Answer,
                        url: dd.AnswerURL || "",
                        source: "DuckDuckGo"
                      });
                    }

                    // Related Topics
                    if (dd.RelatedTopics) {
                      for (var i = 0; i < dd.RelatedTopics.length && allResults.length < mx + 5; i++) {
                        var t = dd.RelatedTopics[i];
                        if (t.Text) {
                          if (t.Topics) {
                            for (var j = 0; j < t.Topics.length && allResults.length < mx + 5; j++) {
                              var st = t.Topics[j];
                              if (st.Text) {
                                allResults.push({
                                  title: st.FirstURL ? decodeURIComponent(st.FirstURL.split("/").pop().replace(/_/g, " ")) : "Related",
                                  snippet: st.Text,
                                  url: st.FirstURL || "",
                                  source: "DuckDuckGo"
                                });
                              }
                            }
                          } else {
                            allResults.push({
                              title: t.FirstURL ? decodeURIComponent(t.FirstURL.split("/").pop().replace(/_/g, " ")) : "Related",
                              snippet: t.Text,
                              url: t.FirstURL || "",
                              source: "DuckDuckGo"
                            });
                          }
                        }
                      }
                    }

                    // Results
                    if (dd.Results) {
                      for (var i = 0; i < dd.Results.length; i++) {
                        var res = dd.Results[i];
                        if (res.Text) {
                          allResults.push({
                            title: res.FirstURL ? decodeURIComponent(res.FirstURL.split("/").pop().replace(/_/g, " ")) : "Result",
                            snippet: res.Text,
                            url: res.FirstURL || "",
                            source: "DuckDuckGo"
                          });
                        }
                      }
                    }
                  }
                } catch(e) {}
              }

              // ===============================================================
              // STRATEGY 3: Reddit JSON API (real discussions, CORS-friendly)
              // ===============================================================
              if (source === "auto" || source === "reddit") {
                try {
                  var redditUrl = "https://www.reddit.com/search.json?q=" + encodeURIComponent(q) + "&limit=" + mx + "&sort=relevance&t=all";
                  var rr = await fetch(redditUrl, {
                    headers: { "User-Agent": "Mozilla/5.0 ChatSeed/1.0" }
                  });
                  if (rr.ok) {
                    var rd = await rr.json();
                    if (rd.data && rd.data.children) {
                      for (var i = 0; i < rd.data.children.length && allResults.length < mx + 3; i++) {
                        var post = rd.data.children[i].data;
                        if (post && post.title) {
                          allResults.push({
                            title: "[Reddit] " + post.title,
                            snippet: (post.selftext || post.url || "").substring(0, 200).replace(/\n/g, " "),
                            url: "https://www.reddit.com" + post.permalink,
                            source: "Reddit"
                          });
                        }
                      }
                    }
                  }
                } catch(e) {}
              }

              // ===============================================================
              // STRATEGY 4: DuckDuckGo HTML via CORS proxy (real web results)
              // ===============================================================
              if (source === "auto" || source === "web") {
                // Try multiple CORS proxies in case one is down
                var proxies = [
                  "https://api.allorigins.win/raw?url=",
                  "https://corsproxy.io/?"
                ];
                for (var pi = 0; pi < proxies.length && allResults.length < mx; pi++) {
                  try {
                    var proxy = proxies[pi];
                    var htmlUrl = "https://html.duckduckgo.com/html/?q=" + encodeURIComponent(q);
                    var hreq = await fetch(proxy + encodeURIComponent(htmlUrl), {
                      signal: AbortSignal.timeout(5000)
                    });
                    if (hreq.ok) {
                      var html = await hreq.text();
                      // Parse results with regex
                      var resultBlocks = html.split('<div class="result__body">');
                      for (var i = 1; i < resultBlocks.length && allResults.length < mx + 2; i++) {
                        var block = resultBlocks[i];
                        var titleMatch = block.match(/<a[^>]*class="result__a"[^>]*>([\s\S]*?)<\/a>/);
                        var snippetMatch = block.match(/<a[^>]*class="result__snippet"[^>]*>([\s\S]*?)<\/a>/);
                        var urlMatch = block.match(/<a[^>]*class="result__url"[^>]*>([\s\S]*?)<\/a>/);

                        if (titleMatch) {
                          var title = titleMatch[1].replace(/<[^>]*>/g, "").trim();
                          var snippet = snippetMatch ? snippetMatch[1].replace(/<[^>]*>/g, "").trim() : "";
                          var urlStr = "";

                          // Try to extract the actual URL from redirect
                          var redirectMatch = block.match(/uddg=([^&"]+)/);
                          if (redirectMatch) {
                            urlStr = decodeURIComponent(redirectMatch[1]);
                          } else if (urlMatch) {
                            urlStr = urlMatch[1].replace(/<[^>]*>/g, "").trim();
                            if (!urlStr.startsWith("http")) urlStr = "https://" + urlStr;
                          }

                          if (title) {
                            allResults.push({
                              title: title,
                              snippet: snippet,
                              url: urlStr,
                              source: "Web"
                            });
                          }
                        }
                      }
                      if (allResults.length > 0) break; // Found results, stop trying proxies
                    }
                  } catch(e) {}
                }
              }

              // ===============================================================
              // STRATEGY 5: News (via GNews RSS / NYT RSS / BBC RSS)
              // ===============================================================
              if (source === "news") {
                try {
                  var newsUrl = "https://www.reddit.com/r/news/search.json?q=" + encodeURIComponent(q) + "&limit=" + mx + "&sort=relevance&restrict_sr=1";
                  var nr = await fetch(newsUrl, {
                    headers: { "User-Agent": "Mozilla/5.0 ChatSeed/1.0" }
                  });
                  if (nr.ok) {
                    var nd = await nr.json();
                    if (nd.data && nd.data.children) {
                      for (var i = 0; i < nd.data.children.length && allResults.length < mx + 2; i++) {
                        var np = nd.data.children[i].data;
                        if (np && np.title) {
                          allResults.push({
                            title: "[News] " + np.title,
                            snippet: (np.selftext || "").substring(0, 200),
                            url: np.url || "https://www.reddit.com" + np.permalink,
                            source: "r/news"
                          });
                        }
                      }
                    }
                  }
                } catch(e) {}
              }

              // ===============================================================
              // Deduplicate & trim
              // ===============================================================
              var seen = {};
              var deduped = [];
              for (var i = 0; i < allResults.length && deduped.length < mx; i++) {
                var item = allResults[i];
                if (!item.title) continue;
                var key = (item.url || item.snippet || item.title).substring(0, 80);
                if (!seen[key]) {
                  seen[key] = true;
                  deduped.push(item);
                }
              }
              allResults = deduped;

              // ===============================================================
              // Format output
              // ===============================================================
              var output = ["## 🔍 Search Results: \"" + q + "\"", ""];

              if (allResults.length === 0) {
                output.push("*No results found. Try a different query or source.*");
                output.push("");
                output.push("🔗 [Search on DuckDuckGo](https://duckduckgo.com/?q=" + encodeURIComponent(q) + ")");
                output.push("🔗 [Search on Wikipedia](https://en.wikipedia.org/wiki/Special:Search?search=" + encodeURIComponent(q) + ")");
                output.push("🔗 [Search on Reddit](https://www.reddit.com/search/?q=" + encodeURIComponent(q) + ")");
              } else {
                var prevSource = "";
                for (var i = 0; i < allResults.length; i++) {

                  if (r.url) output.push("🔗 " + r.url);
                  output.push("");
                }
              }

              return output.join("\n");
            } catch (e) {
              return "## 🔍 Search: \"" + args.query + "\"\n\n❌ Error: " + e.message;
            }
          }
        });

      }catch(ex){return"Error: "+ex.message;}}});
      })(MS);

  // 3. Image Generation (Pollinations AI)
  FALLBACKS["image-gen"] = {
