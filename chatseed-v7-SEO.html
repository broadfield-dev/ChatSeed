<style>
*{-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#030712;color:#f3f4f6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.user-msg{background:#3b82f6;border-radius:18px 18px 4px 18px}
.assistant-msg{background:#1f2937;border-radius:18px 18px 18px 4px}
.prose{max-width:none}
.prose pre{background:#111827;padding:1rem;border-radius:8px;overflow-x:auto;border:1px solid #374151;position:relative}
.prose pre:hover .copy-btn{opacity:1}
.prose code{font-size:.9em;background:#374151;padding:2px 4px;border-radius:4px}
.prose pre code{background:transparent;padding:0}
.copy-btn{position:absolute;top:6px;right:6px;opacity:0;transition:opacity .2s;background:#374151;border:1px solid #4b5563;color:#d1d5db;border-radius:6px;padding:4px 8px;font-size:.7rem;cursor:pointer}
.copy-btn:hover{background:#4b5563;color:white}
.msg-ts{font-size:.65rem;opacity:.5;margin-top:4px;cursor:default}
.streaming-cursor::after{content:'\258A';animation:blink .8s step-end infinite;color:#6ee7b7}
@keyframes blink{50%{opacity:0}}
.msg-appear{animation:fadeSlideIn .3s ease-out}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.token-badge{background:#374151;color:#9ca3af;border-radius:9999px;padding:2px 8px;font-size:.65rem}
.kbd{display:inline-block;padding:2px 6px;font-size:.7rem;background:#374151;border:1px solid #4b5563;border-radius:4px}
.step-bar{background:#064e3b;border:1px solid #065f46;border-radius:12px;padding:8px 16px;font-size:.8rem;display:flex;align-items:center;gap:8px;color:#6ee7b7;animation:fadeSlideIn .3s ease-out}
.step-bar .step-label{color:#d1d5db;flex:1}
.step-bar .step-count{color:#9ca3af;font-size:.7rem}
.step-bar.pulse{box-shadow:0 0 12px rgba(5,150,105,.3)}
.tool-call-badge{display:inline-flex;align-items:center;gap:6px;background:#374151;border:1px solid #4b5563;border-radius:8px;padding:4px 12px;font-size:.75rem;color:#93c5fd}
.tool-call-badge i{font-size:.7rem}
.tool-result{background:#111827;border:1px solid #374151;border-radius:8px;padding:8px 12px;font-size:.75rem;color:#9ca3af;margin-top:4px;max-height:200px;overflow-y:auto}
.model-search-wrap{position:relative}
.model-dropdown{position:absolute;bottom:100%;left:0;right:0;background:#1f2937;border:1px solid #4b5563;border-radius:12px;max-height:240px;overflow-y:auto;z-index:100;display:none;margin-bottom:4px}
.model-dropdown.show{display:block}
.model-dropdown-item{padding:8px 14px;font-size:.8rem;cursor:pointer;border-bottom:1px solid #374151;transition:background .1s}
.model-dropdown-item:last-child{border-bottom:none}
.model-dropdown-item:hover,.model-dropdown-item.active{background:#374151;color:#6ee7b7}
.model-dropdown-item .model-provider{font-size:.65rem;color:#6b7280}
.model-dropdown-item .model-context{font-size:.65rem;color:#9ca3af;float:right}
.scroll-fab{position:absolute;bottom:100px;right:16px;width:44px;height:44px;border-radius:50%;background:#065f46;border:1px solid #059669;color:#6ee7b7;display:none;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.scroll-fab:hover,.scroll-fab:active{background:#047857;transform:scale(1.1)}
.scroll-fab.show{display:flex}
.empty-state .suggestion{background:#1f2937;border:1px solid #374151;border-radius:12px;padding:10px 16px;cursor:pointer;transition:all .15s;font-size:.85rem}
.empty-state .suggestion:hover,.empty-state .suggestion:active{background:#374151;border-color:#059669;color:#6ee7b7}
.cost-badge{font-size:.65rem;color:#9ca3af;background:#374151;border-radius:4px;padding:1px 6px}

/* Settings modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:#1f2937;border:1px solid #374151;border-radius:20px;padding:24px;width:400px;max-width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.modal-box h2{font-size:1.1rem;font-weight:600;margin-bottom:16px;color:#f3f4f6}
.modal-close{float:right;cursor:pointer;color:#9ca3af;font-size:1.2rem}
.modal-close:hover{color:#f3f4f6}
.modal-box label{display:block;font-size:.85rem;margin-bottom:4px;margin-top:12px;color:#d1d5db}
.modal-box input,.modal-box textarea{width:100%;background:#111827;border:1px solid #4b5563;border-radius:10px;padding:10px 14px;font-size:16px;color:#f3f4f6;outline:none}
.modal-box input:focus,.modal-box textarea:focus{border-color:#059669}
.modal-box textarea{resize:vertical}
.modal-box .btn{width:100%;background:#059669;border:none;border-radius:10px;padding:10px;font-size:.85rem;color:white;cursor:pointer;margin-top:12px;font-weight:500}
.modal-box .btn:hover{background:#047857}
.modal-box .btn-secondary{background:#374151}
.modal-box .btn-secondary:hover{background:#4b5563}

/* Sidebar - Desktop: always visible, Mobile: slides in as drawer */
.sidebar{display:flex;flex-direction:column;flex-shrink:0;width:20rem;background:rgb(17 24 39);border-right:1px solid rgb(55 65 81)}

/* Sidebar overlay for mobile */
.sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:49;display:none}
.sidebar-overlay.show{display:block}

/* Hamburger button base style */
.hamburger-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:#1f2937;border:1px solid #374151;color:#d1d5db;cursor:pointer;transition:background .15s;flex-shrink:0}
.hamburger-btn:hover,.hamburger-btn:active{background:#374151;color:#6ee7b7}

/* Mobile responsive styles */
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100vh;z-index:50;border-right:1px solid #374151;transform:translateX(-100%);transition:transform .3s ease;will-change:transform}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .hamburger-btn{display:flex}
  .main-chat{margin-left:0}
  .messages{padding:12px}
  .input-area{padding:8px 12px}
  .user-msg,.assistant-msg{max-width:92%!important;font-size:.92rem}
  .user-msg{padding:10px 16px!important}
  .assistant-msg{padding:10px 16px!important}
  .empty-state-suggestions{max-width:100%!important}
  .header-title{font-size:1.1rem}
  .header{padding:0 12px}
  .scroll-fab{right:12px;bottom:80px;width:40px;height:40px}
  .modal-box{padding:20px;border-radius:16px;margin:8px}
  .modal-box input,.modal-box textarea{font-size:16px}
  .msg-ts{font-size:.6rem}
  .step-bar{font-size:.75rem;padding:6px 12px;margin:0 4px}
  .model-dropdown-item{font-size:.75rem;padding:10px 12px}
  .model-dropdown{max-height:200px}
  .sidebar-header{padding:12px}
  .sidebar-actions{padding:12px}
  .sidebar-history{padding:0 8px}
  .sidebar-footer{padding:12px}
  .conv-item{padding:10px 12px!important}
  textarea#userInput{font-size:16px;padding:12px 16px;min-height:48px}
  .send-btn,.cancel-btn{width:48px;height:48px;min-width:48px}
  .empty-state{padding:16px}
  .empty-state h2{font-size:1rem}
  .empty-state p{font-size:.8rem}
  .cost-badge,.token-badge{font-size:.6rem}
  .kbd{font-size:.65rem;padding:1px 4px}
}

@media(max-width:400px){
  .user-msg,.assistant-msg{max-width:96%!important;font-size:.88rem}
  .user-msg,.assistant-msg{padding:8px 12px!important}
  .messages{padding:8px}
  .input-area{padding:6px 8px}
  textarea#userInput{padding:10px 12px}
}

/* Fix for iOS keyboard */
@media screen and (max-height:500px){
  .sidebar{overflow-y:auto}
  .modal-box{max-height:90vh}
}

/* Prevent zoom on input focus (iOS) */
input,textarea,select{font-size:16px!important}

<body class="h-screen flex" style="">

<!-- Sidebar Overlay for Mobile -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal-overlay">
<div class="modal-box">
<span class="modal-close" onclick="closeSettings()">×</span>
<h2><i class="fas fa-cog text-emerald-500 mr-2"></i>Settings</h2>

<label>OpenRouter API Key <span id="keyStatusModal" class="text-xs"><i class="fas fa-circle text-emerald-500" style="color:#6ee7b7"></i></span></label>
<input id="apiKeyModal" type="password" placeholder="sk-or-..." onchange="syncApiKey()">

<label>System Prompt</label>
<textarea id="sysPromptModal" rows="4" placeholder="Optional system prompt sent with every message..." onchange="saveSysPrompt()"></textarea>

<button class="btn" onclick="saveSettings()">Save Settings</button>
<button class="btn btn-secondary" onclick="closeSettings()" style="margin-top:8px">Close</button>
</div>
</div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
<div class="sidebar-header p-4 border-b border-gray-700 flex items-center justify-between">
<div>
<h1 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-seedling text-emerald-500"></i> ChatSeed</h1>
<p class="text-xs text-emerald-400 mt-1">v7 — Mobile Optimized</p>
</div>
<button id="sidebarCloseBtn" class="hamburger-btn" onclick="closeSidebar()" title="Close sidebar">
<i class="fas fa-times"></i>
</button>
</div>
<div class="sidebar-actions p-4 space-y-2">
<button onclick="newChat()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-2xl font-medium flex items-center justify-center gap-2 transition touch-manipulation"><i class="fas fa-plus"></i> New Chat</button>
<button onclick="openSettings()" class="w-full bg-gray-700 hover:bg-gray-600 py-2 rounded-xl text-xs transition flex items-center justify-center gap-1 touch-manipulation"><i class="fas fa-cog"></i> Settings</button>
</div>
<div class="sidebar-history px-2 flex items-center justify-between mb-1">
<span class="px-2 text-xs uppercase tracking-widest text-gray-500">Conversations</span>
<div class="flex items-center gap-2">
<span id="undoBtn" class="text-xs cursor-pointer hover:text-emerald-400 transition touch-manipulation" title="Undo last evolution write" onclick="undoLastWrite()" style="color:#6ee7b7"><i class="fas fa-undo"></i></span>
<span class="text-xs text-gray-500"><span id="totalTokens">0</span> tok</span>
</div>
</div>
<div class="px-2"><input id="convSearch" class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-500 mb-1" type="text" placeholder="Search conversations..." oninput="renderChatHistory()"></div>
<div id="chatHistory" class="flex-1 overflow-auto px-2 space-y-1"></div>
<div class="sidebar-footer px-4 pb-3 text-xs text-gray-500 text-center">
<span class="kbd">Enter</span> send · <span class="kbd">Shift+Enter</span> newline · <span class="kbd">Esc</span> cancel
</div>
<div class="px-4 py-2 border-t border-gray-700">
<div class="model-search-wrap">
<input id="modelSearchInput" type="text" class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-500" placeholder="Search models..." autocomplete="off" onfocus="window.filterModelDropdown()" oninput="window.filterModelDropdown()" onblur="setTimeout(function(){window.closeModelDropdown()},200)" onkeydown="window.onModelKeydown(event)" data-model-id="">
<div id="modelDropdown" class="model-dropdown"></div>
</div>
</div>
</div>

<!-- Main Chat -->
<div id="mainChat" class="main-chat flex-1 flex flex-col min-w-0 relative">
<div class="header h-14 bg-gray-900 border-b border-gray-700 flex items-center px-6 justify-between shrink-0">
<div class="flex items-center gap-3 min-w-0">
<button id="hamburgerOpenBtn" class="hamburger-btn" onclick="openSidebar()" title="Open menu">
<i class="fas fa-bars"></i>
</button>
<div id="currentModelHeader" class="header-title font-medium text-gray-200 truncate">Loading models...</div>
<span id="tokenUsage" class="token-badge shrink-0">~0 tokens</span>
<span id="costDisplay" class="cost-badge shrink-0 hidden">~$0.0074</span>
</div>
<div class="flex items-center gap-3 text-gray-400 shrink-0">
<label class="flex items-center gap-1 text-xs cursor-pointer touch-manipulation" title="Auto-scroll"><input type="checkbox" id="autoScrollToggle" checked="" onchange="updateAutoScroll()" class="accent-emerald-500"> <i class="fas fa-arrow-down text-xs"></i></label>
<button onclick="exportChat()" title="Export" class="hover:text-emerald-300 transition touch-manipulation"><i class="fas fa-download"></i></button>
<button onclick="deleteCurrentChat()" title="Delete" class="hover:text-red-400 transition touch-manipulation"><i class="fas fa-trash"></i></button>
</div>
</div>
<div id="messages" class="messages flex-1 overflow-y-auto p-6 space-y-4 bg-gray-950"></div>
<div id="scrollFab" class="scroll-fab" onclick="scrollToBottom(true)"><i class="fas fa-arrow-down text-xs"></i></div>
<div class="input-area p-6 bg-gray-900 border-t border-gray-700">
<div class="flex gap-3 items-end">
<textarea id="userInput" rows="1" class="flex-1 bg-gray-800 border border-gray-600 rounded-3xl px-5 py-4 focus:outline-none focus:border-emerald-500 resize-y" placeholder="Send a message..."></textarea>
<button id="sendBtn" onclick="sendMessage()" class="send-btn bg-emerald-600 hover:bg-emerald-700 w-12 h-12 rounded-3xl flex items-center justify-center self-end transition shrink-0 hidden" title="Send"><i class="fas fa-paper-plane"></i></button>
<button id="cancelBtn" onclick="cancelStream()" class="cancel-btn bg-red-700 hover:bg-red-600 w-12 h-12 rounded-3xl flex items-center justify-center self-end transition shrink-0" title="Cancel (Esc)"><i class="fas fa-stop"></i></button>
</div>
</div>
</div>

<div id="toast" class="fixed bottom-6 right-6 bg-gray-800 border border-gray-600 rounded-2xl px-6 py-3 shadow-2xl z-50 hidden">Complete</div>

<script>
// ---- State ----
var API_KEY = '';
var conversations = [];
var currentChatId = null;
var AVAILABLE_MODELS = [];
var isProcessing = false;
var abortController = null;
var autoScroll = true;
var streamBubble = null;
var modelIndex = 0;
var selectedModelId = '';
var evolutionUndoStack = [];
var modelPricing = {};

// Load from localStorage safely
try { API_KEY = localStorage.getItem('chatseed_api_key') || ''; } catch(e) {}
try { conversations = JSON.parse(localStorage.getItem('chatseed_conversations') || '[]'); } catch(e) { conversations = []; }

// ---- Tool Definition ----
var SELF_EVOLUTION_TOOL = {
    type: "function",
    function: {
        name: "evolve_self",
        description: "Read, analyze, diff, refactor, or write the current source code.",
        parameters: {
            type: "object",
            properties: {
                action: { type: "string", enum: ["read","analyze","diff","refactor","write"], description: "What to do" },
                new_code: { type: "string", description: "New HTML code for write/refactor" },
                new_filename: { type: "string", description: "Suggested filename" },
                description: { type: "string", description: "Summary of changes" }
            },
            required: ["action","description"]
        }
    }
};

// ---- Sidebar Controls ----
// Desktop: always visible via CSS (no transform)
// Mobile: slides in/out using transform translateX(-100%)

function isMobile() {
    return window.innerWidth <= 768;
}

function openSidebar() {
    if (!isMobile()) return;
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
    document.body.style.overflow = '';
}

function toggleSidebar() {
    if (!isMobile()) return;
    var s = document.getElementById('sidebar');
    if (s.classList.contains('open')) closeSidebar();
    else openSidebar();
}

// ---- Settings Modal ----
function openSettings() {
    closeSidebar();
    document.getElementById('settingsModal').classList.add('show');
    document.getElementById('apiKeyModal').value = API_KEY;
    var sysVal = '';
    try { sysVal = localStorage.getItem('chatseed_sys_prompt') || ''; } catch(e) {}
    document.getElementById('sysPromptModal').value = sysVal;
    updateKeyStatusModal();
}

function closeSettings() {
    document.getElementById('settingsModal').classList.remove('show');
}

function syncApiKey() {
    API_KEY = document.getElementById('apiKeyModal').value.trim();
    try { localStorage.setItem('chatseed_api_key', API_KEY); } catch(e) {}
    updateKeyStatusModal();
}

function saveSysPrompt() {
    var val = document.getElementById('sysPromptModal').value.trim();
    try { localStorage.setItem('chatseed_sys_prompt', val); } catch(e) {}
}

function saveSettings() {
    syncApiKey();
    saveSysPrompt();
    showToast('Settings saved');
    closeSettings();
}

function updateKeyStatusModal() {
    var el = document.getElementById('keyStatusModal');
    var k = API_KEY;
    if (k && k.indexOf('sk-or-') === 0) el.innerHTML = '<i class="fas fa-circle text-emerald-500" style="color:#6ee7b7"></i>';
    else if (k) el.innerHTML = '<i class="fas fa-circle" style="color:#facc15"></i>';
    else el.innerHTML = '<i class="fas fa-circle" style="color:#6b7280"></i>';
}

function getSystemPrompt() {
    try { return localStorage.getItem('chatseed_sys_prompt') || ''; } catch(e) { return ''; }
}

// ---- Helpers ----
function getCurrentSource() {
    return '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
}

function sanitizeHTML(str) {
    if (typeof DOMPurify !== 'undefined') return DOMPurify.sanitize(str, { ALLOWED_TAGS: [], ALLOWED_ATTR: [] });
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function renderMarkdown(text) {
    if (!text) return '';
    try {
        var raw = marked.parse(text, { breaks: true, gfm: true });
        if (typeof DOMPurify !== 'undefined') return DOMPurify.sanitize(raw);
        return raw;
    } catch(e) { return text.replace(/\n/g, '<br>'); }
}

function downloadNewVersion(code, filename) {
    if (!filename) filename = "chatseed-evolved.html";
    var blob = new Blob([code], { type: 'text/html;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Downloaded: ' + filename);
}

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.remove('hidden');
    clearTimeout(t._timeout);
    t._timeout = setTimeout(function(){ t.classList.add('hidden'); }, 3500);
}

function scrollToBottom(smooth) {
    if (smooth === undefined) smooth = true;
    var c = document.getElementById('messages');
    c.scrollTo({ top: c.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}

function getTimeStr() {
    var d = new Date(), n = new Date();
    var isToday = d.toDateString() === n.toDateString();
    var y = new Date(n); y.setDate(y.getDate()-1);
    var isYest = d.toDateString() === y.toDateString();
    var t = d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    if (isToday) return t;
    if (isYest) return 'Yesterday ' + t;
    return d.toLocaleDateString([], { month:'short', day:'numeric' }) + ' ' + t;
}

function updateAutoScroll() { autoScroll = document.getElementById('autoScrollToggle').checked; }

function getCurrentChat() {
    for (var i=0;i<conversations.length;i++) if (conversations[i].id===currentChatId) return conversations[i];
    return null;
}

function updateTokenDisplay() {
    var chat = getCurrentChat();
    if (!chat) return;
    var total = 0;
    for (var i=0;i<chat.messages.length;i++) {
        var m = chat.messages[i];
        if (m.content) total += m.content.length;
        if (m.tool_calls) for (var j=0;j<m.tool_calls.length;j++) try { total += JSON.stringify(m.tool_calls[j].function).length; } catch(e) {}
    }
    var approx = Math.round(total/4);
    document.getElementById('tokenUsage').textContent = '~'+approx+' tokens';
    document.getElementById('totalTokens').textContent = approx;
    updateCostDisplay(approx);
}

function updateCostDisplay(tokens) {
    var el = document.getElementById('costDisplay');
    if (!selectedModelId||!tokens||!modelPricing[selectedModelId]) { el.classList.add('hidden'); return; }
    var p = modelPricing[selectedModelId];
    var cost = (p.input||0)*tokens + (p.output||0)*(tokens*0.3);
    el.textContent = '~$'+cost.toFixed(4);
    el.classList.remove('hidden');
}

// ---- Model Search ----
function filterModelDropdown() {
    var input = document.getElementById('modelSearchInput');
    var dd = document.getElementById('modelDropdown');
    var q = input.value.toLowerCase().trim();
    var filtered = [];
    for (var i=0;i<AVAILABLE_MODELS.length;i++) {
        var m = AVAILABLE_MODELS[i];
        if (!q || m.id.toLowerCase().indexOf(q)!==-1 || m.name.toLowerCase().indexOf(q)!==-1 || (m.provider&&m.provider.name&&m.provider.name.toLowerCase().indexOf(q)!==-1)) {
            filtered.push(m);
        }
    }
    if (filtered.length===0) {
        dd.innerHTML = '<div class="model-dropdown-item text-gray-500">No models found</div>';
    } else {
        var html = '';
        var count = Math.min(filtered.length, 100);
        for (var i=0;i<count;i++) {
            var m = filtered[i];
            var prov = (m.provider&&m.provider.name) || m.id.split('/')[0] || 'Unknown';
            var ctx = m.context_length ? Math.round(m.context_length/1000)+'k' : '?';
            html += '<div class="model-dropdown-item'+(i===0?' active':'')+'" data-model-id="'+m.id+'" onclick="selectModelFromDropdown(\''+m.id+'\')">';
            html += '<div>'+m.name+' <span class="model-context">'+ctx+'</span></div>';
            html += '<div class="model-provider">'+prov+'</div></div>';
        }
        dd.innerHTML = html;
    }
    dd.classList.add('show');
    modelIndex = 0;
}

function closeModelDropdown() {
    document.getElementById('modelDropdown').classList.remove('show');
}

function onModelKeydown(e) {
    var dd = document.getElementById('modelDropdown');
    var items = dd.querySelectorAll('.model-dropdown-item');
    if (!dd.classList.contains('show')) return;
    if (e.key==='ArrowDown') { e.preventDefault(); modelIndex = Math.min(modelIndex+1, items.length-1); highlightModel(items); }
    else if (e.key==='ArrowUp') { e.preventDefault(); modelIndex = Math.max(modelIndex-1, 0); highlightModel(items); }
    else if (e.key==='Enter') { e.preventDefault(); if (items[modelIndex]&&items[modelIndex].dataset.modelId) selectModelFromDropdown(items[modelIndex].dataset.modelId); }
    else if (e.key==='Escape') closeModelDropdown();
}

function highlightModel(items) {
    for (var i=0;i<items.length;i++) items[i].classList.toggle('active', i===modelIndex);
    if (items[modelIndex]) items[modelIndex].scrollIntoView({block:'nearest'});
}

function selectModelFromDropdown(id) {
    var model = null;
    for (var i=0;i<AVAILABLE_MODELS.length;i++) if (AVAILABLE_MODELS[i].id===id) { model=AVAILABLE_MODELS[i]; break; }
    if (!model) return;
    var input = document.getElementById('modelSearchInput');
    input.value = model.name;
    input.dataset.modelId = id;
    selectedModelId = id;
    closeModelDropdown();
    document.getElementById('currentModelHeader').textContent = model.name;
    var chat = getCurrentChat();
    if (chat) { chat.model = id; saveConversations(); }
    updateTokenDisplay();
}

// ---- Init ----
function init() {
    renderChatHistory();
    if (conversations.length===0) newChat();
    else loadChat(conversations[0].id);
    fetchModels();
    setupScrollDetector();
    setupAutoResize();
    handleResize();
    window.addEventListener('resize', handleResize);
}

function handleResize() {
    var mobile = isMobile();
    // Show/hide hamburger buttons
    var openBtn = document.getElementById('hamburgerOpenBtn');
    var closeBtn = document.getElementById('sidebarCloseBtn');
    if (openBtn) openBtn.style.display = mobile ? 'flex' : 'none';
    if (closeBtn) closeBtn.style.display = mobile ? 'flex' : 'none';
    // Close sidebar when resizing to desktop
    if (!mobile) closeSidebar();
}

function fetchModels() {
    if (!API_KEY) return;
    fetch('https://openrouter.ai/api/v1/models', { headers: { Authorization: 'Bearer '+API_KEY } })
    .then(function(r){ return r.json(); })
    .then(function(data){
        AVAILABLE_MODELS = (data.data||[]).sort(function(a,b){ return a.name.localeCompare(b.name); });
        modelPricing = {};
        for (var i=0;i<AVAILABLE_MODELS.length;i++) {
            var m = AVAILABLE_MODELS[i];
            if (m.pricing) modelPricing[m.id] = { input: parseFloat(m.pricing.prompt)||0, output: parseFloat(m.pricing.completion)||0 };
        }
        var input = document.getElementById('modelSearchInput');
        var chat = getCurrentChat();
        if (chat&&chat.model) {
            var found = null;
            for (var i=0;i<AVAILABLE_MODELS.length;i++) if (AVAILABLE_MODELS[i].id===chat.model) { found=AVAILABLE_MODELS[i]; break; }
            if (found) { input.value=found.name; input.dataset.modelId=found.id; selectedModelId=found.id; document.getElementById('currentModelHeader').textContent=found.name; }
        }
        if (!selectedModelId&&AVAILABLE_MODELS.length) selectModelFromDropdown(AVAILABLE_MODELS[0].id);
    })
    .catch(function(e){ showToast('Failed to load models'); });
}

function setupScrollDetector() {
    document.getElementById('messages').addEventListener('scroll', function(){
        var c = this;
        var fab = document.getElementById('scrollFab');
        var near = c.scrollHeight - c.scrollTop - c.clientHeight < 200;
        fab.classList.toggle('show', autoScroll && !near);
    });
}

function setupAutoResize() {
    var ta = document.getElementById('userInput');
    ta.addEventListener('input', function(){
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 200) + 'px';
    });
}

// ---- Chat Management ----
function newChat() {
    closeSidebar();
    var chat = { id:'chat_'+Date.now(), title:'New Chat', model:selectedModelId||'openai/gpt-4o', messages:[], createdAt:new Date().toISOString() };
    conversations.unshift(chat);
    saveConversations();
    loadChat(chat.id);
}

function loadChat(id) {
    if (id===currentChatId) return;
    currentChatId = id;
    closeSidebar();
    var chat = getCurrentChat();
    if (!chat) return;
    if (chat.model) {
        var found = null;
        for (var i=0;i<AVAILABLE_MODELS.length;i++) if (AVAILABLE_MODELS[i].id===chat.model) { found=AVAILABLE_MODELS[i]; break; }
        var input = document.getElementById('modelSearchInput');
        if (found) { input.value=found.name; input.dataset.modelId=found.id; selectedModelId=found.id; document.getElementById('currentModelHeader').textContent=found.name; }
        else { input.value=chat.model; input.dataset.modelId=chat.model; selectedModelId=chat.model; }
    }
    renderMessages(chat.messages);
    renderChatHistory();
    updateTokenDisplay();
    document.getElementById('scrollFab').classList.remove('show');
}

function renderChatHistory() {
    var container = document.getElementById('chatHistory');
    var qInput = document.getElementById('convSearch');
    var q = qInput ? qInput.value.toLowerCase().trim() : '';
    var filtered = [];
    for (var i=0;i<conversations.length;i++) {
        var c = conversations[i];
        if (!q) { filtered.push(c); continue; }
        if (c.title.toLowerCase().indexOf(q)!==-1) { filtered.push(c); continue; }
        var found = false;
        for (var j=0;j<c.messages.length;j++) if (c.messages[j].content&&c.messages[j].content.toLowerCase().indexOf(q)!==-1) { found=true; break; }
        if (found) filtered.push(c);
    }
    if (filtered.length===0) { container.innerHTML='<div class="text-xs text-gray-500 text-center py-4">No conversations found</div>'; return; }
    var html = '';
    for (var i=0;i<filtered.length;i++) {
        var c = filtered[i];
        var active = c.id===currentChatId ? ' bg-gray-800' : '';
        html += '<div class="conv-item px-4 py-3 rounded-2xl cursor-pointer hover:bg-gray-800 transition touch-manipulation" onclick="loadChat(\''+c.id+'\')">';
        html += '<div class="line-clamp-1 text-sm">'+sanitizeHTML(c.title)+'</div>';
        html += '<div class="text-xs text-gray-500">'+new Date(c.createdAt).toLocaleDateString()+'</div></div>';
    }
    container.innerHTML = html;
}

function cancelStream() {
    if (abortController) { abortController.abort(); abortController=null; showToast('Canceled'); }
}

function quickPrompt(text) {
    document.getElementById('userInput').value = text;
    var es = document.getElementById('emptyState');
    if (es) es.style.display = 'none';
    sendMessage();
}

// ---- Undo ----
function pushUndo(filename, code, desc) {
    evolutionUndoStack.push({ time:Date.now(), filename:filename, code:code, description:desc });
    document.getElementById('undoBtn').style.color = '#6ee7b7';
    document.getElementById('undoBtn').title = 'Undo: '+(desc||filename);
    showToast('Saved to undo stack');
}

function undoLastWrite() {
    if (!evolutionUndoStack.length) { showToast('Nothing to undo'); return; }
    var last = evolutionUndoStack.pop();
    if (!evolutionUndoStack.length) { document.getElementById('undoBtn').style.color=''; document.getElementById('undoBtn').title='Undo last evolution write'; }
    if (last.code) { downloadNewVersion(last.code, 'chatseed-undo-'+last.filename); showToast('Undone: '+(last.description||last.filename)); }
}

// ---- Rendering ----
function createEmptyState() {
    var div = document.createElement('div');
    div.id = 'emptyState';
    div.className = 'empty-state flex flex-col items-center justify-center h-full text-center px-4 sm:px-8';
    div.innerHTML = '<i class="fas fa-seedling text-emerald-600 text-5xl mb-4"></i>' +
        '<h2 class="text-gray-300 font-medium mb-2">Start a conversation</h2>' +
        '<p class="text-gray-500 text-sm mb-6">Send a message or try one of these:</p>' +
        '<div class="space-y-2 w-full max-w-md empty-state-suggestions">' +
        '<div class="suggestion" onclick="quickPrompt(\'Read your code and report what you see\')"><i class="fas fa-code text-emerald-500 mr-2"></i> Read source code</div>' +
        '<div class="suggestion" onclick="quickPrompt(\'Read your code and add a dark/light theme toggle\')"><i class="fas fa-palette text-emerald-500 mr-2"></i> Add a feature</div>' +
        '<div class="suggestion" onclick="quickPrompt(\'Analyze your code for security issues\')"><i class="fas fa-shield text-emerald-500 mr-2"></i> Security audit</div>' +
        '<div class="suggestion" onclick="quickPrompt(\'What can you do with the evolve_self tool?\')"><i class="fas fa-magic text-emerald-500 mr-2"></i> Explain capabilities</div></div>';
    return div;
}

function createMessageElement(msg) {
    if (msg.role==='tool') return null;
    var isUser = msg.role==='user';
    var isTC = msg.role==='assistant' && msg.tool_calls && msg.tool_calls.length>0;
    var w = document.createElement('div');
    w.className = 'flex '+(isUser?'justify-end':'justify-start')+' msg-appear';
    var b = document.createElement('div');
    b.className = (isUser?'user-msg text-white':'assistant-msg')+' max-w-[80%] px-6 py-4 prose prose-invert';
    if (isUser) {
        b.textContent = msg.content||'';
        b.style.whiteSpace = 'pre-wrap';
    } else if (isTC) {
        var html = '';
        for (var i=0;i<msg.tool_calls.length;i++) {
            var tc = msg.tool_calls[i];
            var label = 'Calling tool...';
            var detail = '';
            try {
                var args = JSON.parse(tc.function.arguments);
                var labels = {read:'Reading source code...', analyze:'Analyzing source code...', diff:'Computing diff...', refactor:'Refactoring...', write:'Writing...'};
                label = labels[args.action] || ('Executing '+(args.action||'?')+'...');
                detail = args.description || args.new_filename || 'Processing...';
            } catch(e) { label = 'Executing: '+(tc.function.name||'unknown'); }
            html += '<div class="tool-call-badge"><i class="fas fa-cog fa-spin"></i> '+label+'</div>';
            if (detail) html += '<div class="tool-result">'+sanitizeHTML(detail)+'</div>';
        }
        html += '<div class="msg-ts">'+(msg.timestamp||getTimeStr())+'</div>';
        b.innerHTML = html;
    } else {
        b.innerHTML = renderMarkdown(msg.content||'') + (msg.timestamp?'<div class="msg-ts">'+msg.timestamp+'</div>':'');
    }
    w.appendChild(b);
    return w;
}

function renderMessages(messages) {
    var container = document.getElementById('messages');
    container.innerHTML = '';
    if (!messages||messages.length===0) { container.appendChild(createEmptyState()); return; }
    for (var i=0;i<messages.length;i++) { var el = createMessageElement(messages[i]); if (el) container.appendChild(el); }
    attachCopyButtons();
    if (autoScroll) setTimeout(function(){ scrollToBottom(false); }, 10);
}

function attachCopyButtons() {
    var pres = document.querySelectorAll('.prose pre');
    for (var i=0;i<pres.length;i++) {
        var pre = pres[i];
        if (pre.querySelector('.copy-btn')) continue;
        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
        btn.onclick = (function(p,b){ return function(){
            var code = (p.querySelector('code')&&p.querySelector('code').textContent)||p.textContent;
            navigator.clipboard.writeText(code.trim()).then(function(){ b.innerHTML='<i class="fas fa-check"></i> Copied!'; setTimeout(function(){ b.innerHTML='<i class="fas fa-copy"></i> Copy'; },2000); });
        }; })(pre, btn);
        pre.style.position = 'relative';
        pre.appendChild(btn);
    }
}

// ---- Streaming ----
function startStreamingBubble() {
    removeStreamingBubble();
    var container = document.getElementById('messages');
    var wrapper = document.createElement('div');
    wrapper.className = 'flex justify-start msg-appear';
    wrapper.id = 'stream-container';
    var bubble = document.createElement('div');

    var ts = document.createElement('div');

function updateStreamingContent(html) {

function removeStreamingBubble() {

// ---- Step Bar ----
function addStepBar(num, max, icon, label) {

    bar.className = 'step-bar pulse';

    if (autoScroll) scrollToBottom();
}

function removeStepBar() {
    var el = document.getElementById('step-bar');
    if (el) el.remove();
}

// ---- Multi-Step Evolution ----
async function sendMessage() {
    if (isProcessing) return;
    var input = document.getElementById('userInput');
    var text = input.value.trim();
    if (!text||!currentChatId) return;
    var chat = getCurrentChat();
    if (!chat) return;

    chat.messages.push({ role:"user", content:text, timestamp:getTimeStr() });
    var uc = 0;
    for (var i=0;i<chat.messages.length;i++) if (chat.messages[i].role==='user') uc++;
    if (uc===1) chat.title = text.slice(0,50)+(text.length>50?'...':'');

    input.value = '';
    input.style.height = 'auto';
    isProcessing = true;
    abortController = new AbortController();

    document.getElementById('sendBtn').classList.add('hidden');
    document.getElementById('cancelBtn').classList.remove('hidden');

    var es = document.getElementById('emptyState');
    if (es) es.remove();

    var container = document.getElementById('messages');
    var uel = createMessageElement(chat.messages[chat.messages.length-1]);
    if (uel) container.appendChild(uel);
    renderChatHistory();

    var MAX_STEPS = 10, stepCount = 0;

    try {
        while (stepCount < MAX_STEPS) {
            stepCount++;
            addStepBar(stepCount, MAX_STEPS, 'fa-brain', 'Thinking...');

            var sysP = getSystemPrompt();
            var apiMsgs = sysP ? [{role:"system",content:sysP}] : [];
            for (var i=0;i<chat.messages.length;i++) apiMsgs.push(chat.messages[i]);

            var res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method:'POST',
                headers:{ 'Authorization':'Bearer '+API_KEY, 'Content-Type':'application/json', 'HTTP-Referer':window.location.href, 'X-Title':'ChatSeed' },
                body:JSON.stringify({ model:selectedModelId||'openai/gpt-4o', messages:apiMsgs, tools:[SELF_EVOLUTION_TOOL], tool_choice:"auto", stream:true }),
                signal:abortController.signal
            });
            if (!res.ok) throw new Error('API '+res.status);

            var reader = res.body.getReader();
            var decoder = new TextDecoder();
            var buf = '', fullContent = '', toolCalls = [];
            var rt = null;

            startStreamingBubble();

            while (true) {
                var r = await reader.read();
                if (r.done) break;
                buf += decoder.decode(r.value, {stream:true});
                var lines = buf.split('\n');
                buf = lines.pop()||'';
                for (var li=0;li<lines.length;li++) {
                    var line = lines[li];
                    if (line.indexOf('data: ')!==0) continue;
                    var json = line.slice(6).trim();
                    if (!json||json==='[DONE]') continue;
                    try {
                        var chunk = JSON.parse(json);
                        var d = (chunk.choices&&chunk.choices[0]) ? (chunk.choices[0].delta||{}) : {};
                        if (d.content) {
                            fullContent += d.content;
                            if (!rt) rt = setTimeout(function(){ rt=null; updateStreamingContent(renderMarkdown(fullContent)); }, 30);
                        }
                        if (d.tool_calls) {
                            for (var tci=0;tci<d.tool_calls.length;tci++) {
                                var tc = d.tool_calls[tci];
                                if (tc.function&&tc.function.name) {
                                    var found = null;
                                    for (var ei=0;ei<toolCalls.length;ei++) if (toolCalls[ei].index===(tc.index||0)) { found=toolCalls[ei]; break; }
                                    if (found) found.function.arguments += tc.function.arguments||'';
                                    else toolCalls.push({ index:tc.index||0, id:tc.id||('tc_'+Date.now()), type:'function', function:{name:tc.function.name, arguments:tc.function.arguments||''} });
                                } else if (tc.function&&tc.function.arguments) {
                                    for (var ei=0;ei<toolCalls.length;ei++) if (toolCalls[ei].index===(tc.index||0)) { toolCalls[ei].function.arguments+=tc.function.arguments; break; }
                                }
                            }
                        }
                        if (chunk.choices&&chunk.choices[0]&&(chunk.choices[0].finish_reason==='stop'||chunk.choices[0].finish_reason==='tool_calls')) break;
                    } catch(e) {}
                }
            }
            if (rt) { clearTimeout(rt); rt=null; }
            if (fullContent) updateStreamingContent(renderMarkdown(fullContent));
            removeStreamingBubble();

            if (toolCalls.length>0) {
                for (var tci=0;tci<toolCalls.length;tci++) {
                    var tc = toolCalls[tci], args;
                    try { args=JSON.parse(tc.function.arguments); } catch(e) { showToast('Failed to parse tool args'); continue; }
                    var tcMsg = { role:"assistant", content:null, tool_calls:[{ id:tc.id, type:"function", function:{name:tc.function.name, arguments:tc.function.arguments} }], timestamp:getTimeStr() };
                    chat.messages.push(tcMsg);
                    var tcEl = createMessageElement(tcMsg);
                    if (tcEl) container.appendChild(tcEl);
                    try {
                        if (args.action==="read") {
                            addStepBar(stepCount, MAX_STEPS, 'fa-book-open', 'Reading source code...');
                            var code = getCurrentSource();
                            chat.messages.push({ role:"tool", tool_call_id:tc.id, content:'Here is my current full source code:\n\n```html\n'+code+'\n```' });
                        } else if (args.action==="analyze") {
                            addStepBar(stepCount, MAX_STEPS, 'fa-search', 'Analyzing source code...');
                            var src = getCurrentSource(), sl = src.split('\n'), jc=0,hc=0;
                            for (var si=0;si<sl.length;si++) { var t=sl[si].trim(); if (t.indexOf('function ')==0||t.indexOf('var ')==0||t.indexOf('let ')==0||t.indexOf('const ')==0||t.indexOf('=>')!==-1) jc++; if (t.indexOf('<')!==-1) hc++; }
                            var a = '## Code Analysis\n\n- **Total lines:** '+sl.length+'\n- **Characters:** '+src.length+'\n- **JS lines:** '+jc+'\n- **HTML lines:** '+hc+'\n\n### Suggestions\n'+(args.description||'Done.');
                            chat.messages.push({ role:"tool", tool_call_id:tc.id, content:a });
                        } else if (args.action==="diff") {
                            addStepBar(stepCount, MAX_STEPS, 'fa-code-compare', 'Computing diff...');
                            chat.messages.push({ role:"tool", tool_call_id:tc.id, content:'## Proposed Changes\n\n'+(args.description||'No description.')+'\n\n```diff\n+ See description\n```' });
                        } else if (args.action==="refactor") {
                            addStepBar(stepCount, MAX_STEPS, 'fa-wrench', 'Refactoring...');
                            if (args.new_code) { downloadNewVersion(args.new_code, args.new_filename||"chatseed-refactored.html"); pushUndo(args.new_filename||"chatseed-refactored.html", getCurrentSource(), args.description||'Refactor'); chat.messages.push({ role:"tool", tool_call_id:tc.id, content:'Refactored: '+(args.new_filename||'done')+' - '+(args.description||'') }); }
                            else { chat.messages.push({ role:"tool", tool_call_id:tc.id, content:'Refactor requested but no code.' }); }
                        } else if (args.action==="write"&&args.new_code) {
                            addStepBar(stepCount, MAX_STEPS, 'fa-wand-magic-sparkles', 'Writing: '+(args.new_filename||'new version'));
                            downloadNewVersion(args.new_code, args.new_filename||"chatseed-evolved.html");
                            pushUndo(args.new_filename||"chatseed-evolved.html", getCurrentSource(), args.description||'Write');
                            chat.messages.push({ role:"tool", tool_call_id:tc.id, content:'Write: "'+(args.new_filename||'chatseed-evolved.html')+'" - '+(args.description||'') });
                        } else {
                            chat.messages.push({ role:"tool", tool_call_id:tc.id, content:'Unknown action "'+(args.action||'?')+'".' });
                        }
                    } catch(terr) { chat.messages.push({ role:"tool", tool_call_id:tc.id, content:'Error: '+terr.message }); showToast('Tool error'); }
                }
            } else if (fullContent) {
                var finalMsg = { role:"assistant", content:fullContent, timestamp:getTimeStr() };
                chat.messages.push(finalMsg);
                var el = createMessageElement(finalMsg);
                if (el) container.appendChild(el);
                break;
            } else {
                addStepBar(stepCount, MAX_STEPS, 'fa-exclamation-triangle', 'Retrying without streaming...');
                try {
                    var sysP2 = getSystemPrompt();
                    var am2 = sysP2 ? [{role:"system",content:sysP2}] : [];
                    for (var i=0;i<chat.messages.length;i++) am2.push(chat.messages[i]);
                    var fb = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method:'POST', headers:{ 'Authorization':'Bearer '+API_KEY, 'Content-Type':'application/json' },
                        body:JSON.stringify({ model:selectedModelId||'openai/gpt-4o', messages:am2, tools:[SELF_EVOLUTION_TOOL], tool_choice:"auto", stream:false })
                    });
                    if (!fb.ok) throw new Error('FB '+fb.status);
                    var fd = await fb.json();
                    var fm = fd.choices&&fd.choices[0]?fd.choices[0].message:null;
                    if (fm&&fm.tool_calls&&fm.tool_calls.length) {
                        for (var fi=0;fi<fm.tool_calls.length;fi++) {
                            var ft = fm.tool_calls[fi], fa; try { fa=JSON.parse(ft.function.arguments); } catch(e) { continue; }
                            var ftm = { role:"assistant", content:null, tool_calls:[ft], timestamp:getTimeStr() };
                            chat.messages.push(ftm);
                            var fte = createMessageElement(ftm);
                            if (fte) container.appendChild(fte);
                            if (fa.action==="read") chat.messages.push({ role:"tool", tool_call_id:ft.id, content:'Source code:\n```html\n'+getCurrentSource()+'\n```' });
                            else if (fa.action==="analyze") chat.messages.push({ role:"tool", tool_call_id:ft.id, content:'Analysis: '+(fa.description||'Done.') });
                            else if ((fa.action==="write"||fa.action==="refactor")&&fa.new_code) { downloadNewVersion(fa.new_code, fa.new_filename); pushUndo(fa.new_filename||"chatseed-evolved.html", getCurrentSource(), fa.description||fa.action); chat.messages.push({ role:"tool", tool_call_id:ft.id, content:(fa.action==='write'?'Write':'Refactored')+': '+(fa.new_filename||'done') }); }
                            else chat.messages.push({ role:"tool", tool_call_id:ft.id, content:(fa.action||'Done')+': '+(fa.description||'') });
                        }
                    } else {
                        var ff = { role:"assistant", content:(fm&&fm.content)||"", timestamp:getTimeStr() };
                        chat.messages.push(ff);
                        var fe = createMessageElement(ff);
                        if (fe) container.appendChild(fe);
                        break;
                    }
                } catch(fbe) { showToast('Fallback failed: '+fbe.message); break; }
            }
            removeStepBar();
            saveConversations();
            updateTokenDisplay();
        }
        removeStepBar();
        saveConversations();
        updateTokenDisplay();
        attachCopyButtons();
        if (stepCount>=MAX_STEPS) showToast('Max steps (10) reached');
        else if (stepCount>0) showToast('Complete');
    } catch(err) {
        removeStepBar(); removeStreamingBubble();
        if (err.name==='AbortError') showToast('Canceled');
        else { console.error(err); showToast('Error: '+err.message); }
    } finally {
        isProcessing=false; abortController=null;
        document.getElementById('sendBtn').classList.remove('hidden');
        document.getElementById('cancelBtn').classList.add('hidden');
    }
}

function saveConversations() {
    try { localStorage.setItem('chatseed_conversations', JSON.stringify(conversations)); } catch(e) {}
}

function deleteCurrentChat() {
    if (!currentChatId||!confirm('Delete this conversation?')) return;
    var nu = [];
    for (var i=0;i<conversations.length;i++) if (conversations[i].id!==currentChatId) nu.push(conversations[i]);
    conversations = nu;
    saveConversations(); currentChatId=null;
    if (conversations.length) loadChat(conversations[0].id); else newChat();
}

function exportChat() {
    var chat = getCurrentChat();
    if (!chat) return;
    var ds = JSON.stringify(chat, null, 2);
    var du = 'data:application/json;charset=utf-8,'+encodeURIComponent(ds);
    var a = document.createElement('a');
    a.href = du; a.download = chat.title.replace(/[^a-z0-9]/gi,'_')+'.json';
    a.click();
}

// ---- Event Listeners ----
document.getElementById('userInput').addEventListener('keydown', function(e){
    if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); }
    if (e.key==='Escape'&&isProcessing) cancelStream();
});

// Close sidebar on swipe left (mobile)
var touchStartX = 0;
document.addEventListener('touchstart', function(e){
    touchStartX = e.touches[0].clientX;
});
document.addEventListener('touchend', function(e){
    var sidebar = document.getElementById('sidebar');
    if (!sidebar.classList.contains('open')) return;
    var dx = e.changedTouches[0].clientX - touchStartX;
    // Swipe right-to-left (negative dx) to close
    if (dx < -60) closeSidebar();
});

// Close sidebar on Escape key
document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') {
        closeSidebar();
        closeModelDropdown();
    }
});

window.onload = init;
</script>
</body></html>
