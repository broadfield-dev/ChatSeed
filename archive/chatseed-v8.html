<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>ChatSeed v8 - Modules</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
*{-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#030712;color:#f3f4f6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.user-msg{background:#3b82f6;border-radius:18px 18px 4px 18px}
.assistant-msg{background:#1f2937;border-radius:18px 18px 18px 4px}
.tool-result-msg{background:#111827;border:1px solid #374151;border-radius:12px;padding:10px 16px;font-size:.82rem;color:#d1d5db;line-height:1.5}
.prose{max-width:none}
.prose pre{background:#111827;padding:1rem;border-radius:8px;overflow-x:auto;border:1px solid #374151;position:relative}
.prose pre:hover .copy-btn{opacity:1}
.prose code{font-size:.9em;background:#374151;padding:2px 4px;border-radius:4px}
.prose pre code{background:transparent;padding:0}
.copy-btn{position:absolute;top:6px;right:6px;opacity:0;transition:opacity .2s;background:#374151;border:1px solid #4b5563;color:#d1d5db;border-radius:6px;padding:4px 8px;font-size:.7rem;cursor:pointer;z-index:5}
.copy-btn:hover{background:#4b5563;color:white}
.msg-ts{font-size:.65rem;opacity:.5;margin-top:4px;cursor:default}
.msg-appear{animation:fadeSlideIn .3s ease-out}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
.token-badge{background:#374151;color:#9ca3af;border-radius:9999px;padding:2px 8px;font-size:.65rem}
.kbd{display:inline-block;padding:2px 6px;font-size:.7rem;background:#374151;border:1px solid #4b5563;border-radius:4px}
.step-entry{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#064e3b;border:1px solid #065f46;border-radius:8px;font-size:.75rem;color:#6ee7b7;animation:fadeSlideIn .3s ease-out;margin-bottom:2px}
.step-entry.completed{border-color:#059669;background:rgba(5,150,105,0.12)}
.step-entry .step-icon{font-size:0.65rem;width:14px;text-align:center}
.streaming-card{border:1px solid #374151;border-radius:10px;overflow:hidden;background:#0f172a}
.streaming-card .stream-header{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#1e293b;border-bottom:1px solid #334155}
.streaming-card .stream-dot{width:6px;height:6px;border-radius:50%;background:#6ee7b7;animation:pulse-dot 1.2s ease-in-out infinite}
.streaming-card .stream-body{padding:10px 14px;font-size:.85rem;color:#e2e8f0;line-height:1.6;min-height:20px}
.tool-call-group{border:1px solid #374151;border-radius:10px;overflow:hidden;background:#0f172a}
.tc-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1e293b;cursor:pointer;user-select:none;transition:background .12s;border-bottom:1px solid #1e293b}
.tc-header:hover{background:#334155}
.tc-name-badge{font-size:.65rem;background:#334155;color:#93c5fd;border-radius:4px;padding:2px 6px;white-space:nowrap}
.tc-status-badge{font-size:.6rem;background:#064e3b;color:#6ee7b7;border-radius:999px;padding:1px 8px}
.tc-arrow{font-size:.6rem;color:#64748b;transition:transform .2s}
.tc-body{padding:10px 14px;font-size:.77rem;color:#cbd5e1;line-height:1.5;max-height:300px;overflow-y:auto;border-top:1px solid #1e293b;background:#0f172a}
.tc-body pre{background:#0f172a;border:1px solid #1e293b;border-radius:6px;padding:8px;font-size:.7rem;color:#e2e8f0;overflow-x:auto;margin:0}
.tc-body .tc-label{font-size:.7rem;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.download-card{display:flex;align-items:center;gap:12px;background:#111827;border:1px solid #374151;border-radius:12px;padding:12px 16px;margin:8px 0;animation:fadeSlideIn .3s ease-out;transition:all .15s}
.download-card:hover{border-color:#059669;background:#1a2030}
.download-icon{width:40px;height:40px;border-radius:10px;background:#064e3b;border:1px solid #065f46;display:flex;align-items:center;justify-content:center;color:#6ee7b7;font-size:1.1rem;flex-shrink:0}
.download-info{flex:1;min-width:0}
.download-filename{font-size:.85rem;font-weight:500;color:#f3f4f6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.download-desc{font-size:.7rem;color:#9ca3af;margin-top:2px}
.download-btn{display:inline-flex;align-items:center;gap:6px;background:#059669;color:white;border:none;border-radius:8px;padding:8px 14px;font-size:.75rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all .15s;flex-shrink:0}
.download-btn:hover{background:#047857;transform:scale(1.04)}
.download-btn:active{transform:scale(.97)}
.downloads-header{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#6ee7b7;margin:12px 0 4px 0;display:flex;align-items:center;gap:6px;font-weight:500}
.model-search-wrap{position:relative}
.model-dropdown{position:absolute;bottom:100%;left:0;right:0;background:#1f2937;border:1px solid #4b5563;border-radius:12px;max-height:240px;overflow-y:auto;z-index:100;display:none;margin-bottom:4px}
.model-dropdown.show{display:block}
.model-dropdown-item{padding:8px 14px;font-size:.8rem;cursor:pointer;border-bottom:1px solid #374151;transition:background .1s}
.model-dropdown-item:last-child{border:none}
.model-dropdown-item:hover,.model-dropdown-item.active{background:#374151;color:#6ee7b7}
.model-dropdown-item .model-provider{font-size:.65rem;color:#6b7280}
.model-dropdown-item .model-context{font-size:.65rem;color:#9ca3af;float:right}
.scroll-fab{position:absolute;bottom:100px;right:16px;width:44px;height:44px;border-radius:50%;background:#065f46;border:1px solid #059669;color:#6ee7b7;display:none;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.scroll-fab:hover,.scroll-fab:active{background:#047857;transform:scale(1.1)}
.scroll-fab.show{display:flex}
.empty-state .suggestion{background:#1f2937;border:1px solid #374151;border-radius:12px;padding:10px 16px;cursor:pointer;transition:all .15s;font-size:.85rem}
.empty-state .suggestion:hover,.empty-state .suggestion:active{background:#374151;border-color:#059669;color:#6ee7b7}
.cost-badge{font-size:.65rem;color:#9ca3af;background:#374151;border-radius:4px;padding:1px 6px}
.module-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:#111827;border:1px solid #374151;margin-bottom:4px;transition:all .15s}
.module-item:hover{border-color:#4b5563}
.module-item .mod-name{flex:1;font-size:.75rem;color:#d1d5db}
.module-item .mod-status{font-size:.55rem;text-transform:uppercase;letter-spacing:.05em}
.module-item .mod-toggle{width:28px;height:16px;border-radius:8px;background:#374151;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.module-item .mod-toggle.on{background:#059669}
.module-item .mod-toggle::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:white;transition:transform .2s}
.module-item .mod-toggle.on::after{transform:translateX(12px)}
.module-accordion-header{cursor:pointer;user-select:none}
.module-accordion-header:hover{color:#6ee7b7}
.accordion-arrow{transition:transform .3s ease;display:inline-block}
.accordion-arrow.open{transform:rotate(180deg)}
.module-accordion-body{overflow:hidden;transition:max-height .35s ease,opacity .25s ease;max-height:0;opacity:0}
.module-accordion-body.open{opacity:1}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:#1f2937;border:1px solid #374151;border-radius:20px;padding:24px;width:420px;max-width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.modal-box h2{font-size:1.1rem;font-weight:600;margin-bottom:16px;color:#f3f4f6}
.modal-close{float:right;cursor:pointer;color:#9ca3af;font-size:1.2rem}
.modal-close:hover{color:#f3f4f6}
.modal-box label{display:block;font-size:.85rem;margin-bottom:4px;margin-top:12px;color:#d1d5db}
.modal-box input,.modal-box textarea,.modal-box select{width:100%;background:#111827;border:1px solid #4b5563;border-radius:10px;padding:10px 14px;font-size:16px;color:#f3f4f6;outline:none}
.modal-box input:focus,.modal-box textarea:focus,.modal-box select:focus{border-color:#059669}
.modal-box textarea{resize:vertical;font-family:inherit}
.modal-box .btn{width:100%;background:#059669;border:none;border-radius:10px;padding:10px;font-size:.85rem;color:white;cursor:pointer;margin-top:12px;font-weight:500}
.modal-box .btn:hover{background:#047857}
.modal-box .btn-secondary{background:#374151}
.modal-box .btn-secondary:hover{background:#4b5563}
.settings-row{display:flex;align-items:center;gap:12px;margin-top:8px}
.settings-row input[type="range"]{flex:1;accent-color:#059669;height:6px;border-radius:3px;background:#374151;max-width:200px}
.settings-row .range-value{font-size:.85rem;color:#6ee7b7;min-width:30px;text-align:center;font-weight:500}
.settings-row .checkbox-label{display:flex;align-items:center;gap:6px;font-size:.8rem;color:#9ca3af;cursor:pointer}
.settings-row .checkbox-label input{width:auto;accent-color:#059669}
.sidebar{display:flex;flex-direction:column;flex-shrink:0;width:20rem;background:#111827;border-right:1px solid #374151}
.sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:49;display:none}
.sidebar-overlay.show{display:block}
.hamburger-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:#1f2937;border:1px solid #374151;color:#d1d5db;cursor:pointer;transition:background .15s;flex-shrink:0}
.hamburger-btn:hover,.hamburger-btn:active{background:#374151;color:#6ee7b7}
@media(max-width:768px){
.sidebar{position:fixed;top:0;left:0;height:100vh;z-index:50;border-right:1px solid #374151;transform:translateX(-100%);transition:transform .3s ease}
.sidebar.open{transform:translateX(0)}.sidebar-overlay.show{display:block}.hamburger-btn{display:flex}.main-chat{margin-left:0}
.messages{padding:12px}.input-area{padding:8px 12px}.user-msg,.assistant-msg{max-width:92%!important;font-size:.92rem}
.user-msg,.assistant-msg{padding:10px 16px!important}.empty-state-suggestions{max-width:100%!important}.header-title{font-size:1.1rem}.header{padding:0 12px}
.scroll-fab{right:12px;bottom:80px;width:40px;height:40px}.modal-box{padding:20px;border-radius:16px;margin:8px}
.modal-box input,.modal-box textarea{font-size:16px}.msg-ts{font-size:.6rem}.step-entry{font-size:.7rem;padding:5px 10px}
.tc-header{padding:6px 10px}.tc-body{padding:8px 10px;font-size:.72rem}
.model-dropdown-item{font-size:.75rem;padding:10px 12px}.model-dropdown{max-height:200px}
.sidebar-header,.sidebar-actions{padding:12px}.sidebar-history,.sidebar-footer{padding:0 8px}.conv-item{padding:10px 12px!important}
textarea#userInput{font-size:16px;padding:12px 16px;min-height:48px}.send-btn,.cancel-btn{width:48px;height:48px;min-width:48px}.empty-state{padding:16px}
.empty-state h2{font-size:1rem}.empty-state p{font-size:.8rem}.cost-badge,.token-badge{font-size:.6rem}.kbd{font-size:.65rem;padding:1px 4px}.module-item .mod-name{font-size:.7rem}
}
@media(max-width:400px){
.user-msg,.assistant-msg{max-width:96%!important;font-size:.88rem}.user-msg,.assistant-msg{padding:8px 12px!important}
.messages{padding:8px}.input-area{padding:6px 8px}textarea#userInput{padding:10px 12px}
}
@media screen and (max-height:500px){.sidebar{overflow-y:auto}.modal-box{max-height:90vh}}
input,textarea,select{font-size:16px!important}

<body class="h-screen flex">

<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="settingsModal" class="modal-overlay">
<div class="modal-box">
<span class="modal-close" onclick="closeSettings()">×</span>
<h2><i class="fas fa-cog text-emerald-500 mr-2"></i>Settings</h2>
<label>OpenRouter API Key <span id="keyStatusModal" class="text-xs"><i class="fas fa-circle" style="color:#6b7280"></i></span></label>
<input id="apiKeyModal" type="password" placeholder="sk-or-..." onchange="syncApiKey()">
<label>System Prompt</label>
<textarea id="sysPromptModal" rows="4" placeholder="Optional system prompt..." onchange="saveSysPrompt()"></textarea>
<label>Max Steps (turn limit)</label>
<div class="settings-row">
  <input type="range" id="stepSlider" min="1" max="50" value="10" oninput="updateStepDisplay()">
  <span id="stepValue" class="range-value">10</span>
  <label class="checkbox-label"><input type="checkbox" id="unlimitedSteps" onchange="toggleUnlimitedSteps()"> Unlimited</label>
</div>
<button class="btn" onclick="saveSettings()">Save Settings</button>
<button class="btn btn-secondary" onclick="closeSettings()" style="margin-top:8px">Close</button>
</div>
</div>

<div id="sidebar" class="sidebar">
<div class="sidebar-header p-4 border-b border-gray-700 flex items-center justify-between">
<div><h1 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-seedling text-emerald-500"></i> ChatSeed</h1><p class="text-xs text-emerald-400 mt-1">v8 Modules</p></div>
<button id="sidebarCloseBtn" class="hamburger-btn" onclick="closeSidebar()" title="Close" style="display:none"><i class="fas fa-times"></i></button>
</div>
<div class="sidebar-actions p-4 space-y-2">
<button onclick="newChat()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-2xl font-medium flex items-center justify-center gap-2"><i class="fas fa-plus"></i> New Chat</button>
<button onclick="openSettings()" class="w-full bg-gray-700 hover:bg-gray-600 py-2 rounded-xl text-xs flex items-center justify-center gap-1"><i class="fas fa-cog"></i> Settings</button>
</div>
<div class="border-t border-gray-700">
<div class="flex items-center justify-between px-4 py-2 module-accordion-header" onclick="toggleModulesAccordion()">
<span class="text-xs uppercase tracking-widest text-gray-500"><i class="fas fa-puzzle-piece text-emerald-500 mr-1"></i> Modules <i id="modulesAccordionArrow" class="accordion-arrow fas fa-chevron-down" style="font-size:10px;margin-left:4px"></i></span>
<div class="flex items-center gap-2">
<span id="activeModuleCount" class="text-xs text-emerald-400 font-medium" style="font-size:.6rem">7 active</span>
<button onclick="event.stopPropagation(); reloadModules()" class="text-xs text-gray-500 hover:text-emerald-400" title="Reload"><i class="fas fa-sync"></i></button>
</div>
</div>
<div id="modulesAccordionBody" class="module-accordion-body" style="max-height:0"><div id="moduleList" class="px-4 pb-2 space-y-1"></div></div>
</div>
<div class="sidebar-history px-2 flex items-center justify-between mb-1 mt-2">
<span class="px-2 text-xs uppercase tracking-widest text-gray-500">Conversations</span>
<div class="flex items-center gap-2">
<span id="undoBtn" class="text-xs cursor-pointer hover:text-emerald-400" title="Undo last evolution write" onclick="undoLastWrite()" style="color: rgb(107, 114, 128);"><i class="fas fa-undo"></i></span>
<span class="text-xs text-gray-500"><span id="totalTokens">0</span> tok</span>
</div>
</div>
<div class="px-2"><input id="convSearch" class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-500 mb-1" type="text" placeholder="Search conversations..." oninput="renderChatHistory()"></div>
<div id="chatHistory" class="flex-1 overflow-auto px-2 space-y-1"></div>
<div class="sidebar-footer px-4 pb-3 text-xs text-gray-500 text-center"><span class="kbd">Enter</span> send · <span class="kbd">Shift+Enter</span> newline · <span class="kbd">Esc</span> cancel</div>
<div class="px-4 py-2 border-t border-gray-700">
<div class="model-search-wrap">
<input id="modelSearchInput" type="text" class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-500" placeholder="Search models..." autocomplete="off" onfocus="filterModelDropdown()" oninput="filterModelDropdown()" onblur="setTimeout(function(){closeModelDropdown()},200)" onkeydown="onModelKeydown(event)" data-model-id="">
<div id="modelDropdown" class="model-dropdown"></div>
</div>
</div>
</div>

<div id="mainChat" class="main-chat flex-1 flex flex-col min-w-0 relative">
<div class="header h-14 bg-gray-900 border-b border-gray-700 flex items-center px-6 justify-between shrink-0">
<div class="flex items-center gap-3 min-w-0">
<button id="hamburgerOpenBtn" class="hamburger-btn" onclick="openSidebar()" title="Menu" style="display:none"><i class="fas fa-bars"></i></button>
<div id="currentModelHeader" class="header-title font-medium text-gray-200 truncate">Select a model...</div>
<span id="tokenUsage" class="token-badge shrink-0">~0 tokens</span>
<span id="costDisplay" class="cost-badge shrink-0 hidden">~$0.0000</span>
</div>
<div class="flex items-center gap-3 text-gray-400 shrink-0">
<label class="flex items-center gap-1 text-xs cursor-pointer"><input type="checkbox" id="autoScrollToggle" checked="" onchange="updateAutoScroll()" class="accent-emerald-500"> <i class="fas fa-arrow-down text-xs"></i></label>
<button onclick="exportChat()" title="Export" class="hover:text-emerald-300"><i class="fas fa-download"></i></button>
<button onclick="deleteCurrentChat()" title="Delete" class="hover:text-red-400"><i class="fas fa-trash"></i></button>
</div>
</div>
<div id="messages" class="messages flex-1 overflow-y-auto p-6 space-y-4 bg-gray-950"></div>
<div id="scrollFab" class="scroll-fab" onclick="scrollToBottom(true)"><i class="fas fa-arrow-down text-xs"></i></div>
<div class="input-area p-6 bg-gray-900 border-t border-gray-700">
<div class="flex gap-3 items-end">
<textarea id="userInput" rows="1" class="flex-1 bg-gray-800 border border-gray-600 rounded-3xl px-5 py-4 focus:outline-none focus:border-emerald-500 resize-y" placeholder="Send a message..." style="height: auto;"></textarea>
<button id="sendBtn" onclick="sendMessage()" class="send-btn bg-emerald-600 hover:bg-emerald-700 w-12 h-12 rounded-3xl flex items-center justify-center self-end shrink-0"><i class="fas fa-paper-plane"></i></button>
<button id="cancelBtn" onclick="cancelStream()" class="cancel-btn bg-red-700 hover:bg-red-600 w-12 h-12 rounded-3xl flex items-center justify-center self-end shrink-0 hidden"><i class="fas fa-stop"></i></button>
</div>
</div>
</div>

<div id="toast" class="fixed bottom-6 right-6 bg-gray-800 border border-gray-600 rounded-2xl px-6 py-3 shadow-2xl z-50 hidden">Ready</div>

<script>
// ===== STATE =====
var API_KEY = "";
var conversations = [];
var currentChatId = null;
var AVAILABLE_MODELS = [];
var isProcessing = false;
var abortController = null;
var autoScroll = true;
var streamBubble = null;
var streamBodyEl = null;
var modelIndex = 0;
var selectedModelId = "";
var evolutionUndoStack = [];
var modelPricing = {};
var modulesAccordionOpen = false;
var MAX_STEPS = 10;
var MODULE_REGISTRY = {};
var MODULE_STATES = {};
var CORE_TOOLS = [];
var CLEAN_SOURCE_CACHE = null;

// ===== INIT LOAD =====
try { API_KEY = localStorage.getItem("chatseed_api_key") || ""; } catch(e) {}
try { var saved = localStorage.getItem("chatseed_conversations"); if (saved) { var p = JSON.parse(saved); if (Array.isArray(p)) conversations = p; } } catch(e) {}
try { var sv = localStorage.getItem("chatseed_max_steps"); if (sv) MAX_STEPS = parseInt(sv) || 10; } catch(e) {}

(function captureCleanSource() {
  var raw = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  raw = raw.replace(/<div id="chatHistory"[^>]*>.*?<\/div><\/div><div class="sidebar-footer/, '<div id="chatHistory" class="flex-1 overflow-auto px-2 space-y-1"></div><div class="sidebar-footer');
  raw = raw.replace(/(<div id="messages"[^>]*>).*?(<\/div>)/, '$1$2');
  CLEAN_SOURCE_CACHE = raw;
})();

// ===== HELPERS =====
function getCurrentSource() {
  if (CLEAN_SOURCE_CACHE) return CLEAN_SOURCE_CACHE;
  var raw = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  CLEAN_SOURCE_CACHE = raw;
  return CLEAN_SOURCE_CACHE;
}

function sanitizeHTML(str) {
  if (typeof DOMPurify !== "undefined") return DOMPurify.sanitize(str, {ALLOWED_TAGS:[],ALLOWED_ATTR:[]});
  var d = document.createElement("div"); d.textContent = str; return d.innerHTML;
}

function renderMarkdown(text) {
  if (!text) return "";
  try {
    var raw = marked.parse(text, {breaks:true, gfm:true});
    if (typeof DOMPurify !== "undefined") return DOMPurify.sanitize(raw);
    return raw;
  } catch(e) { return text.replace(/\n/g, "<br>"); }
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.remove("hidden");
  clearTimeout(t._timeout);
  t._timeout = setTimeout(function(){ t.classList.add("hidden"); }, 3500);
}

function scrollToBottom(smooth) {
  if (smooth === undefined) smooth = true;
  var c = document.getElementById("messages");
  c.scrollTop = c.scrollHeight;
}

function getTimeStr() {
  var d = new Date();
  return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

function updateAutoScroll() { autoScroll = document.getElementById("autoScrollToggle").checked; }

function getCurrentChat() {
  for (var i = 0; i < conversations.length; i++) if (conversations[i].id === currentChatId) return conversations[i];
  return null;
}

// ===== PERSISTENCE =====
function saveConversations() {
  try {
    var json = JSON.stringify(conversations);
    localStorage.setItem("chatseed_conversations", json);
  } catch(e) { console.warn("Save failed:", e); }
}

// ===== UI STATE MANAGEMENT =====
function setProcessingUI(processing) {
  var sendBtn = document.getElementById("sendBtn");
  var cancelBtn = document.getElementById("cancelBtn");
  if (!sendBtn || !cancelBtn) return;
  if (processing) {
    sendBtn.classList.add("hidden");
    cancelBtn.classList.remove("hidden");
  } else {
    sendBtn.classList.remove("hidden");
    cancelBtn.classList.add("hidden");
  }
}

function updateTokenDisplay() {
  var chat = getCurrentChat();
  if (!chat) return;
  var total = 0;
  for (var i = 0; i < chat.messages.length; i++) {
    if (chat.messages[i].content) total += chat.messages[i].content.length;
  }
  var approx = Math.round(total / 4);
  document.getElementById("tokenUsage").textContent = "~" + approx + " tokens";
  document.getElementById("totalTokens").textContent = approx;
  updateCostDisplay(approx);
}

function updateCostDisplay(tokens) {
  var el = document.getElementById("costDisplay");
  if (!selectedModelId || !tokens || !modelPricing[selectedModelId]) { el.classList.add("hidden"); return; }
  var p = modelPricing[selectedModelId];
  var cost = (p.input||0) * tokens + (p.output||0) * (tokens * 0.3);
  el.textContent = "~$" + cost.toFixed(4);
  el.classList.remove("hidden");
}

function isMobile() { return window.innerWidth <= 768; }

function openSidebar() {
  if (!isMobile()) return;
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebarOverlay").classList.add("show");
  document.body.style.overflow = "hidden";
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("show");
  document.body.style.overflow = "";
}

function openSettings() {
  closeSidebar();
  document.getElementById("settingsModal").classList.add("show");
  document.getElementById("apiKeyModal").value = API_KEY;
  try { document.getElementById("sysPromptModal").value = localStorage.getItem("chatseed_sys_prompt") || ""; } catch(e) {}
  var s = document.getElementById("stepSlider");
  s.value = MAX_STEPS >= 999 ? 50 : MAX_STEPS;
  document.getElementById("stepValue").textContent = MAX_STEPS >= 999 ? "\u221e" : MAX_STEPS;
  document.getElementById("unlimitedSteps").checked = (MAX_STEPS >= 999);
  updateKeyStatusModal();
}
function closeSettings() { document.getElementById("settingsModal").classList.remove("show"); }

function syncApiKey() {
  API_KEY = document.getElementById("apiKeyModal").value.trim();
  try { localStorage.setItem("chatseed_api_key", API_KEY); } catch(e) {}
  updateKeyStatusModal();
}
function saveSysPrompt() {
  try { localStorage.setItem("chatseed_sys_prompt", document.getElementById("sysPromptModal").value.trim()); } catch(e) {}
}
function updateStepDisplay() {
  var val = parseInt(document.getElementById("stepSlider").value);
  document.getElementById("stepValue").textContent = val;
  document.getElementById("unlimitedSteps").checked = false;
  MAX_STEPS = val;
  try { localStorage.setItem("chatseed_max_steps", MAX_STEPS); } catch(e) {}
}
function toggleUnlimitedSteps() {
  if (document.getElementById("unlimitedSteps").checked) { MAX_STEPS = 999; document.getElementById("stepSlider").value = 999; document.getElementById("stepValue").textContent = "\u221e"; }
  else { MAX_STEPS = 10; document.getElementById("stepSlider").value = 10; document.getElementById("stepValue").textContent = "10"; }
  try { localStorage.setItem("chatseed_max_steps", MAX_STEPS); } catch(e) {}
}
function saveSettings() { syncApiKey(); saveSysPrompt(); closeSettings(); showToast("Settings saved"); }
function updateKeyStatusModal() {
  var el = document.getElementById("keyStatusModal");
  if (API_KEY && API_KEY.indexOf("sk-or-") === 0) el.innerHTML = '<i class="fas fa-circle" style="color:#6ee7b7"></i>';
  else if (API_KEY) el.innerHTML = '<i class="fas fa-circle" style="color:#facc15"></i>';
  else el.innerHTML = '<i class="fas fa-circle" style="color:#6b7280"></i>';
}
function getSystemPrompt() { try { return localStorage.getItem("chatseed_sys_prompt") || ""; } catch(e) { return ""; } }

// ===== MODEL DROPDOWN =====
function filterModelDropdown() {
  var input = document.getElementById("modelSearchInput");
  var dd = document.getElementById("modelDropdown");
  var q = input.value.toLowerCase().trim();
  var filtered = [];
  for (var i = 0; i < AVAILABLE_MODELS.length; i++) {
    var m = AVAILABLE_MODELS[i];
    if (!q || m.id.toLowerCase().indexOf(q) !== -1 || m.name.toLowerCase().indexOf(q) !== -1) filtered.push(m);
  }
  var html = "";
  var count = Math.min(filtered.length, 100);
  for (var i = 0; i < count; i++) {
    var m = filtered[i], prov = (m.provider && m.provider.name) || m.id.split("/")[0] || "?";
    var ctx = m.context_length ? Math.round(m.context_length/1000)+"k" : "?";
    html += '<div class="model-dropdown-item'+(i===0?' active':'')+'" data-model-id="'+m.id+'" onclick="selectModelFromDropdown(\''+m.id+'\')"><div>'+m.name+' <span class="model-context">'+ctx+'</span></div><div class="model-provider">'+prov+'</div></div>';
  }
  dd.innerHTML = html||'<div class="model-dropdown-item text-gray-500">No models found</div>';
  dd.classList.add("show");
  modelIndex = 0;
}
function closeModelDropdown() { document.getElementById("modelDropdown").classList.remove("show"); }
function onModelKeydown(e) {
  var dd = document.getElementById("modelDropdown");
  var items = dd.querySelectorAll(".model-dropdown-item");
  if (!dd.classList.contains("show")) return;
  if (e.key === "ArrowDown") { e.preventDefault(); modelIndex = Math.min(modelIndex+1, items.length-1); highlightModel(items); }
  else if (e.key === "ArrowUp") { e.preventDefault(); modelIndex = Math.max(modelIndex-1, 0); highlightModel(items); }
  else if (e.key === "Enter") { e.preventDefault(); if (items[modelIndex] && items[modelIndex].dataset.modelId) selectModelFromDropdown(items[modelIndex].dataset.modelId); }
  else if (e.key === "Escape") closeModelDropdown();
}
function highlightModel(items) {
  for (var i = 0; i < items.length; i++) items[i].classList.toggle("active", i === modelIndex);
  if (items[modelIndex]) items[modelIndex].scrollIntoView({block:"nearest"});
}
function selectModelFromDropdown(id) {
  var model = null;
  for (var i = 0; i < AVAILABLE_MODELS.length; i++) if (AVAILABLE_MODELS[i].id === id) { model = AVAILABLE_MODELS[i]; break; }
  if (!model) return;
  var input = document.getElementById("modelSearchInput");
  input.value = model.name;
  input.dataset.modelId = id;
  selectedModelId = id;
  closeModelDropdown();
  document.getElementById("currentModelHeader").textContent = model.name;
  var chat = getCurrentChat();
  if (chat) { chat.model = id; saveConversations(); }
  updateTokenDisplay();
}

// ===== CHAT MANAGEMENT =====
function newChat() {
  closeSidebar();
  if (currentChatId) saveConversations();
  var chat = getCurrentChat();
  if (chat && chat.messages.length === 0 && chat.title === "New Chat") return;
  chat = {id:"chat_"+Date.now(), title:"New Chat", model:selectedModelId||"", messages:[], createdAt:new Date().toISOString()};
  conversations.unshift(chat);
  saveConversations();
  loadChat(chat.id);
}

function loadChat(id) {
  if (id === currentChatId) return;
  if (currentChatId) saveConversations();
  currentChatId = id;
  closeSidebar();
  var chat = getCurrentChat();
  if (!chat) return;
  if (chat.model) {
    var found = null;
    for (var i = 0; i < AVAILABLE_MODELS.length; i++) if (AVAILABLE_MODELS[i].id === chat.model) { found = AVAILABLE_MODELS[i]; break; }
    var input = document.getElementById("modelSearchInput");
    if (found) { input.value = found.name; input.dataset.modelId = found.id; selectedModelId = found.id; document.getElementById("currentModelHeader").textContent = found.name; }
    else { input.value = chat.model; input.dataset.modelId = chat.model; selectedModelId = chat.model; document.getElementById("currentModelHeader").textContent = chat.model; }
  }
  // FIXED: Don't reset buttons if an operation is in progress
  if (!isProcessing) setProcessingUI(false);
  renderMessages(chat.messages);
  renderChatHistory();
  updateTokenDisplay();
  document.getElementById("scrollFab").classList.remove("show");
}

function renderChatHistory() {
  var container = document.getElementById("chatHistory");
  var qInput = document.getElementById("convSearch");
  var q = qInput ? qInput.value.toLowerCase().trim() : "";
  var filtered = [];
  for (var i = 0; i < conversations.length; i++) {
    var c = conversations[i];
    if (!q) { filtered.push(c); continue; }
    if (c.title.toLowerCase().indexOf(q) !== -1) { filtered.push(c); continue; }
    var found = false;
    for (var j = 0; j < c.messages.length; j++) { if (c.messages[j].content && c.messages[j].content.toLowerCase().indexOf(q) !== -1) { found = true; break; } }
    if (found) filtered.push(c);
  }
  if (filtered.length === 0) { container.innerHTML = '<div class="text-xs text-gray-500 text-center py-4">No conversations found</div>'; return; }
  var html = "";
  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    html += '<div class="conv-item px-4 py-3 rounded-2xl cursor-pointer hover:bg-gray-800" onclick="loadChat(\''+c.id+'\')"><div class="line-clamp-1 text-sm">'+sanitizeHTML(c.title)+'</div><div class="text-xs text-gray-500">'+new Date(c.createdAt).toLocaleDateString()+'</div></div>';
  }
  container.innerHTML = html;
}

function cancelStream() {
  if (abortController) {
    abortController.abort();
    showToast("Canceled");
  }
}

function deleteCurrentChat() {
  if (!currentChatId || !confirm("Delete this conversation?")) return;
  var nu = [];
  for (var i = 0; i < conversations.length; i++) if (conversations[i].id !== currentChatId) nu.push(conversations[i]);
  conversations = nu;
  saveConversations();
  currentChatId = null;
  if (conversations.length) loadChat(conversations[0].id); else newChat();
}

function exportChat() {
  var chat = getCurrentChat();
  if (!chat) return;
  var a = document.createElement("a");
  a.href = "data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(chat, null, 2));
  a.download = chat.title.replace(/[^a-z0-9]/gi,"_")+".json";
  a.click();
}

function pushUndo(fn, code, desc) {
  evolutionUndoStack.push({time:Date.now(), filename:fn, code:code, description:desc});
  document.getElementById("undoBtn").style.color = "#6ee7b7";
  document.getElementById("undoBtn").title = "Undo: "+(desc||fn);
}

function undoLastWrite() {
  if (!evolutionUndoStack.length) { showToast("Nothing to undo"); return; }
  var last = evolutionUndoStack.pop();
  if (!evolutionUndoStack.length) { document.getElementById("undoBtn").style.color = ""; document.getElementById("undoBtn").title = "Undo last evolution write"; }
  if (last.code) { FileDownloader.add(last.code,"chatseed-undo-"+last.filename,last.description); showToast("Undo ready: "+last.filename); }
}

// ===== MESSAGE RENDERING =====
function createEmptyState() {
  var div = document.createElement("div");
  div.id = "emptyState";
  div.className = "empty-state flex flex-col items-center justify-center h-full text-center px-4 sm:px-8";
  var modDesc = ModuleSystem.getToolDescriptions();
var modDesc = ModuleSystem.getToolDescriptions();
  var mdHtml = modDesc ? '<div class="text-xs text-emerald-500 mt-4 mb-2 font-medium uppercase tracking-widest">📦 Available Modules</div><div class="text-xs text-left text-gray-300" style="max-width:400px">'+renderMarkdown(modDesc)+'</div>' : "";
  div.innerHTML = '<i class="fas fa-seedling text-emerald-600 text-5xl mb-4"></i><h2 class="text-gray-300 font-medium mb-2">Start a conversation</h2><p class="text-gray-500 text-sm mb-6">Send a message or try one of these:</p><div class="space-y-2 w-full max-w-md empty-state-suggestions"><div class="suggestion" onclick="quickPrompt(\'Read your code and report what you see\')"><i class="fas fa-code text-emerald-500 mr-2"></i> Read source code</div><div class="suggestion" onclick="quickPrompt(\'Read your code and add a dark/light theme toggle\')"><i class="fas fa-palette text-emerald-500 mr-2"></i> Add a feature</div><div class="suggestion" onclick="quickPrompt(\'What can you do with the evolve_self tool?\')"><i class="fas fa-magic text-emerald-500 mr-2"></i> Explain capabilities</div><div class="suggestion" onclick="quickPrompt(\'List and describe all available module tools\')"><i class="fas fa-puzzle-piece text-emerald-500 mr-2"></i> List module tools</div></div>'+mdHtml;
  return div;
}

function createMessageElement(msg) {
  if (msg.role === "tool") {
    var w = document.createElement("div"), b = document.createElement("div");
    w.className = "flex justify-start msg-appear";
    b.className = "assistant-msg max-w-[80%] px-6 py-4 prose prose-invert";
    var content = msg.content || "";
    if (content.indexOf("download-card") !== -1 || content.indexOf("downloads-header") !== -1) {
      b.innerHTML = content;
    } else if (content.indexOf("```") !== -1 || content.indexOf("**") !== -1 || content.indexOf("##") !== -1 || content.indexOf("![") !== -1) {
      b.innerHTML = renderMarkdown(content);
    } else {
      b.textContent = content;
      b.style.whiteSpace = "pre-wrap";
    }
    if (msg.timestamp) { var ts = document.createElement("div"); ts.className = "msg-ts"; ts.textContent = msg.timestamp; b.appendChild(ts); }
    w.appendChild(b);
    return w;
  }
  var isUser = msg.role === "user";
  var isTC = msg.role === "assistant" && msg.tool_calls && msg.tool_calls.length > 0;
  var w = document.createElement("div");
  w.className = "flex "+(isUser?"justify-end":"justify-start")+" msg-appear";
  var b = document.createElement("div");
  b.className = (isUser?"user-msg text-white":"assistant-msg")+" max-w-[80%] px-6 py-4 prose prose-invert";
  if (isUser) { b.textContent = msg.content||""; b.style.whiteSpace = "pre-wrap"; }
  else if (isTC) {
    var html = '<div class="tool-call-group">';
    for (var i = 0; i < msg.tool_calls.length; i++) {
      var tc = msg.tool_calls[i], label = "Calling tool...", detail = "";
      var toolName = tc.function.name || "unknown";
      var toolArgs = {};
      try { toolArgs = JSON.parse(tc.function.arguments); var labels = {read:"Read source code",analyze:"Analyze source code",diff:"Compute diff",refactor:"Refactor code",write:"Write code",read_lines:"Read lines",edit_lines:"Edit lines",insert_lines:"Insert lines",delete_lines:"Delete lines",append_lines:"Append lines",search_code:"Search code"}; label = labels[toolArgs.action] || ("Execute "+(toolArgs.action||"?")); detail = toolArgs.description||toolArgs.new_filename||toolArgs.content||""; } catch(e) { label = "Execute: "+toolName; }
      var tid2 = "tc_"+Date.now()+"_"+i+"_"+Math.random().toString(36).substr(2,5);
      html += '<div class="tc-header" onclick="toggleToolDetail(\''+tid2+'\')"><i class="fas fa-cog fa-fw" style="font-size:0.75rem;color:#6ee7b7"></i><span class="tc-name-badge">'+sanitizeHTML(toolName)+'</span><span style="flex:1;font-size:0.75rem;color:#e2e8f0;font-weight:500">'+sanitizeHTML(label)+'</span><span class="tc-status-badge">pending</span><i class="fas fa-chevron-down tc-arrow" id="'+tid2+'_arrow"></i></div><div id="'+tid2+'" class="tc-body">';
      if (detail) html += '<div class="tc-label">Description</div><div style="white-space:pre-wrap;margin-bottom:8px">'+sanitizeHTML(detail)+'</div>';
      html += '<div class="tc-label">Arguments</div><pre>'+sanitizeHTML(JSON.stringify(toolArgs,null,2))+'</pre></div>';
    }
    html += '</div>';
    if (msg.content) html = '<div style="white-space:pre-wrap;margin-bottom:8px">'+renderMarkdown(msg.content)+'</div>' + html;
    if (msg.timestamp) html += '<div class="msg-ts">'+msg.timestamp+'</div>';
    b.innerHTML = html;
  } else {
    b.innerHTML = renderMarkdown(msg.content||"");
    if (msg.timestamp) { var ts = document.createElement("div"); ts.className = "msg-ts"; ts.textContent = msg.timestamp; b.appendChild(ts); }
  }
  w.appendChild(b);
  return w;
}

function renderMessages(messages) {
  var container = document.getElementById("messages");
  container.innerHTML = "";
  if (!messages || messages.length === 0) { container.appendChild(createEmptyState()); return; }
  for (var i = 0; i < messages.length; i++) { var el = createMessageElement(messages[i]); if (el) container.appendChild(el); }
  attachCopyButtons();
  if (autoScroll) setTimeout(function(){scrollToBottom(false);}, 10);
}

function attachCopyButtons() {
  document.querySelectorAll(".prose pre").forEach(function(pre){
    if (pre.querySelector(".copy-btn")) return;
    var btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
    btn.onclick = function(){
      var code = (pre.querySelector("code")&&pre.querySelector("code").textContent)||pre.textContent;
      navigator.clipboard.writeText(code.trim()).then(function(){ btn.innerHTML = '<i class="fas fa-check"></i> Copied!'; setTimeout(function(){ btn.innerHTML = '<i class="fas fa-copy"></i> Copy'; },2000); });
    };
    pre.style.position = "relative";
    pre.appendChild(btn);
  });
}

function toggleToolDetail(id) {
  var el = document.getElementById(id+""); if (!el) return;
  var isHidden = el.style.display === "none" || el.style.display === "";
  el.style.display = isHidden ? "block" : "none";
  var arrow = document.getElementById(id+"_arrow");
  if (arrow) arrow.style.transform = isHidden ? "rotate(0deg)" : "rotate(-90deg)";
}

function startStreamingBubble() {
  removeStreamingBubble();
  var wrapper = document.createElement("div");
  wrapper.className = "flex justify-start msg-appear";
  wrapper.id = "stream-container";
  var bubble = document.createElement("div");
  bubble.className = "assistant-msg max-w-[80%] px-6 py-4 prose prose-invert";
  bubble.id = "stream-bubble-content";
  var tid = "stream_"+Date.now();
  bubble.innerHTML = '<div class="streaming-card"><div class="stream-header"><i class="fas fa-pen-fancy" style="font-size:0.75rem;color:#6ee7b7"></i><span style="flex:1;font-size:0.75rem;color:#94a3b8;font-weight:500">Generating response...</span><div class="stream-dot"></div></div><div id="'+tid+'" class="stream-body"></div></div>';
  var ts = document.createElement("div"); ts.className = "msg-ts"; ts.textContent = getTimeStr(); bubble.appendChild(ts);
  wrapper.appendChild(bubble);
  document.getElementById("messages").appendChild(wrapper);
  streamBubble = wrapper;
  streamBodyEl = document.getElementById(tid);
  if (autoScroll) scrollToBottom();
}

function updateStreamingContent(html) { if (streamBodyEl) { streamBodyEl.innerHTML = html; if (autoScroll) scrollToBottom(false); } }
function removeStreamingBubble() {
  var el = document.getElementById("stream-container"); if (el) el.remove();
  streamBubble = null; streamBodyEl = null;
}

function removeStepBar() {
  var historyLog = document.getElementById("step-history-log");
  if (!historyLog) return;
  var entries = historyLog.querySelectorAll(".step-entry");
  if (entries.length > 0) {
    var last = entries[entries.length-1];
    last.classList.add("completed");
    var icon = last.querySelector(".step-icon i");
    if (icon) icon.className = "fas fa-check";
  }
}

function clearStepBars() {
  var el = document.getElementById("step-history-log");
  if (el) el.remove();
}

function addStepBar(num, max, icon, label) {
  var container = document.getElementById("messages");
  var historyLog = document.getElementById("step-history-log");
  if (!historyLog) {
    historyLog = document.createElement("div");
    historyLog.id = "step-history-log";
    historyLog.style.cssText = "display:flex;flex-direction:column;gap:2px;padding:0 6px;margin:2px 0";
    container.appendChild(historyLog);
  }
  var entries = historyLog.querySelectorAll(".step-entry");
  if (entries.length > 0 && num > 1) {
    var prev = entries[entries.length-1];
    if (!prev.classList.contains("completed")) { prev.classList.add("completed"); var pi = prev.querySelector(".step-icon i"); if (pi) { pi.className = "fas fa-check"; } }
  }
  var entry = document.createElement("div");
  entry.className = "step-entry";

// ===== LINE EDITOR =====
var LineEditor = {
  read: function(s,e,c) {
    var src = getCurrentSource(), lines = src.split("\n"), total = lines.length;
    var start = (s!==undefined&&s!==null)?Math.max(1,parseInt(s)):1, end = (e!==undefined&&e!==null)?Math.min(total,parseInt(e)):total;
    if (start && !end) end = start;
    var selected = lines.slice(start-1, end);
    var r = [];
    if (c) {
      r.push("Source ("+total+" lines)");
      if (start > 1) r.push("  ... (lines 1-"+(start-1)+" hidden)");
      for (var i = 0; i < selected.length; i++) r.push(" "+(start+i).toString().padStart(4," ")+" | "+selected[i]);
      if (end < total) r.push("  ... (lines "+(end+1)+"-"+total+" hidden)");
    } else {
      r.push("Lines "+start+"-"+end+" of "+total);
      for (var i = 0; i < selected.length; i++) r.push((start+i).toString().padStart(4," ")+" | "+selected[i]);
    }
    return r.join("\n");
  },
  edit: function(s,e,c) {
    var src = getCurrentSource(), lines = src.split("\n"), total = lines.length;
    var start = Math.max(1,parseInt(s)), end = Math.min(total,parseInt(e));
    if (start > end) return null;
    var ins = c.split("\n");
    return {newCode: lines.slice(0,start-1).concat(ins).concat(lines.slice(end)).join("\n")};
  },
  insert: function(n,c) {
    var lines = getCurrentSource().split("\n");
    var ln = Math.min(Math.max(1,parseInt(n)), lines.length+1);
    var ins = c.split("\n");
    return {newCode: lines.slice(0,ln-1).concat(ins).concat(lines.slice(ln-1)).join("\n")};
  },
  del: function(s,e) {
    var lines = getCurrentSource().split("\n"), total = lines.length;
    var start = Math.max(1,parseInt(s)), end = Math.min(total,parseInt(e));
    if (start > end) return null;
    return {newCode: lines.slice(0,start-1).concat(lines.slice(end)).join("\n")};
  },
  append: function(c) { var lines = getCurrentSource().split("\n"); return {newCode: lines.concat(c.split("\n")).join("\n")}; },
  search: function(p,r) {
    var lines = getCurrentSource().split("\n"), res = [];
    try { var re = r ? new RegExp(p) : new RegExp(p.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i"); for (var i = 0; i < lines.length; i++) if (re.test(lines[i])) res.push({line:i+1,text:lines[i]}); } catch(e) { return null; }
    return res;
  }
};

var ModuleSystem = {
  register: function(id, api) {
    if (MODULE_REGISTRY[id]) return;

    MODULE_STATES[id] = { enabled: true, loaded: true, status: "active" };
    if (api.tools) api.tools.forEach(function(t){ t._moduleId = id; });
    renderModuleList();
    rebuildCoreTools();
    if (api.hooks && api.hooks.onInit) try { api.hooks.onInit(); } catch(e) {}
  },
  handleToolCall: async function(tn, args, tcid) {
    for (var id in MODULE_REGISTRY) {
      var mod = MODULE_REGISTRY[id];
      if (!MODULE_STATES[id] || !MODULE_STATES[id].enabled) continue;
      if (mod.handleToolCall && typeof mod.handleToolCall === "function") {
        var result = await mod.handleToolCall(tn, args, tcid);
        if (result !== undefined && result !== null) return result;
      }
    }
    return null;
  },
  getToolDescriptions: function() {
    var lines = [];
    for (var id in MODULE_REGISTRY) {
      var mod = MODULE_REGISTRY[id];
      if (!MODULE_STATES[id] || !MODULE_STATES[id].enabled) continue;
      if (mod.description) lines.push("- **"+mod.name+"**: "+mod.description);

    renderModuleList();
    rebuildCoreTools();

};

  removeStreamingBubble();
  clearStepBars();

  var es = document.getElementById("emptyState");
  if (es) es.remove();

  var container = document.getElementById("messages");
  var uel = createMessageElement(chat.messages[chat.messages.length - 1]);
  if (uel) container.appendChild(uel);
  renderChatHistory();
  if (autoScroll) scrollToBottom();

  var stepCount = 0;
  try {
    while (stepCount < MAX_STEPS) {
      stepCount++;
      addStepBar(stepCount, MAX_STEPS, "fa-brain", "Thinking...");
      var sysP = getSystemPrompt();
      var modDesc = ModuleSystem.getToolDescriptions();
      var ctx = modDesc ? "\n\n## Available Module Tools\n"+modDesc : "";
      var apiMsgs = [];
      if (sysP || ctx) apiMsgs.push({role:"system", content:(sysP||"You are ChatSeed.")+ctx+"\n\nUse evolve_self to modify source code. For targeted changes, use read_lines/edit_lines/insert_lines/delete_lines/append_lines/search_code. Module tools extend your capabilities."});
      for (var i = 0; i < chat.messages.length; i++) apiMsgs.push(chat.messages[i]);

      var res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method:"POST",
        headers:{"Authorization":"Bearer "+API_KEY, "Content-Type":"application/json", "HTTP-Referer":window.location.href, "X-Title":"ChatSeed"},
        body:JSON.stringify({model:selectedModelId||"openai/gpt-4o", messages:apiMsgs, tools:CORE_TOOLS.length>0?CORE_TOOLS:undefined, tool_choice:"auto", stream:true}),
        signal:abortController.signal
      });
      if (!res.ok) throw new Error("API "+res.status);

      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buf = "";
      var fullContent = "";
      // FIXED: Use object keyed by index for proper multi-tool-call accumulation
      var toolCalls = {};
      var toolCallOrder = [];
      var rt = null;
      startStreamingBubble();

      while (true) {
        var rd = await reader.read();
        if (rd.done) break;
        buf += decoder.decode(rd.value, {stream:true});
        var lines = buf.split("\n");
        buf = lines.pop() || "";
        for (var li = 0; li < lines.length; li++) {
          var line = lines[li];
          if (line.indexOf("data: ") !== 0) continue;
          var json = line.slice(6).trim();
          if (!json || json === "[DONE]") continue;
          try {
            var chunk = JSON.parse(json);
            var d = (chunk.choices && chunk.choices[0]) ? (chunk.choices[0].delta||{}) : {};
            if (d.content) {
              fullContent += d.content;
              if (!rt) rt = setTimeout(function(){ rt = null; updateStreamingContent(renderMarkdown(fullContent)); }, 30);
            }
            if (d.tool_calls) {
              for (var tci = 0; tci < d.tool_calls.length; tci++) {
                var tc = d.tool_calls[tci];
                var idx = tc.index || 0;
                if (!toolCalls[idx]) {
                  toolCalls[idx] = {index: idx, id: tc.id || ("tc_"+Date.now()+"_"+idx), type: "function", function: {name: "", arguments: ""}};
                  toolCallOrder.push(idx);
                }
                if (tc.function) {
                  if (tc.function.name) toolCalls[idx].function.name += tc.function.name;
                  if (tc.function.arguments) toolCalls[idx].function.arguments += tc.function.arguments;
                }
              }
            }
          } catch(e) {}
        }
      }
      if (rt) { clearTimeout(rt); rt = null; }

      if (fullContent && streamBodyEl) updateStreamingContent(renderMarkdown(fullContent));
      removeStreamingBubble();

      // FIXED: Build ONE consolidated array of tool calls in order
      var consolidatedCalls = [];
      for (var oi = 0; oi < toolCallOrder.length; oi++) {
        var idx = toolCallOrder[oi];
        var tc = toolCalls[idx];
        if (tc) consolidatedCalls.push({id: tc.id, type: "function", function: {name: tc.function.name, arguments: tc.function.arguments}});
      }

      if (consolidatedCalls.length > 0) {
        // FIXED: Push ONE assistant message with ALL tool_calls in a single array
        var tcMsg = {role: "assistant", content: fullContent || null, tool_calls: consolidatedCalls, timestamp: getTimeStr()};
        chat.messages.push(tcMsg);
        var tcEl = createMessageElement(tcMsg);
        if (tcEl) container.appendChild(tcEl);

        // Execute each tool call sequentially
        for (var tci = 0; tci < consolidatedCalls.length; tci++) {
          var tc = consolidatedCalls[tci], args;
          try { args = JSON.parse(tc.function.arguments); } catch(e) { showToast("Failed to parse tool args"); continue; }
          try {
            var moduleResult = await ModuleSystem.handleToolCall(tc.function.name, args, tc.id);
            if (moduleResult !== null) {
              var toolContent = typeof moduleResult === "string" ? moduleResult : JSON.stringify(moduleResult);
              chat.messages.push({role:"tool", tool_call_id:tc.id, content:toolContent, timestamp:getTimeStr()});
              var toolEl = createMessageElement({role:"tool", tool_call_id:tc.id, content:toolContent, timestamp:getTimeStr()});
              if (toolEl) container.appendChild(toolEl);
            } else if (tc.function.name === "evolve_self") {
              var lineResult = handleEvolveSelfLineAction(args);
              if (lineResult !== null) {
                chat.messages.push({role:"tool", tool_call_id:tc.id, content:lineResult, timestamp:getTimeStr()});
                var toolEl = createMessageElement({role:"tool", tool_call_id:tc.id, content:lineResult, timestamp:getTimeStr()});
                if (toolEl) container.appendChild(toolEl);
              } else {
                if (args.action === "analyze") {
                  addStepBar(stepCount, MAX_STEPS, "fa-search", "Analyzing...");
                  var src = getCurrentSource(), sl = src.split("\n"), jc = 0, hc = 0;
                  for (var si = 0; si < sl.length; si++) { var t = sl[si].trim(); if (t.indexOf("function ")===0||t.indexOf("var ")===0||t.indexOf("let ")===0||t.indexOf("const ")===0||t.indexOf("=>")!==-1) jc++; if (t.indexOf("<")!==-1) hc++; }
                  var analysis = "## Code Analysis\n\n- **Lines:** "+sl.length+"\n- **JS lines:** "+jc+"\n- **HTML lines:** "+hc+"\n\n"+(args.description||"");
                  chat.messages.push({role:"tool", tool_call_id:tc.id, content:analysis, timestamp:getTimeStr()});
                  var toolEl = createMessageElement({role:"tool", tool_call_id:tc.id, content:analysis, timestamp:getTimeStr()});
                  if (toolEl) container.appendChild(toolEl);
                } else if ((args.action === "write" || args.action === "refactor") && args.new_code) {
                  addStepBar(stepCount, MAX_STEPS, args.action==="write"?"fa-wand-magic-sparkles":"fa-wrench", args.action==="write"?"Writing...":"Refactoring...");
                  pushUndo(args.new_filename||"chatseed-evolved.html", getCurrentSource(), args.description||args.action);
                  var result = '<div class="downloads-header"><i class="fas fa-file-export"></i> '+(args.action==="write"?"New file":"Refactored")+'</div>'+FileDownloader.add(args.new_code, args.new_filename||"chatseed-evolved.html", args.description||args.action);
                  chat.messages.push({role:"tool", tool_call_id:tc.id, content:result, timestamp:getTimeStr()});
                  var toolEl = createMessageElement({role:"tool", tool_call_id:tc.id, content:result, timestamp:getTimeStr()});
                  if (toolEl) container.appendChild(toolEl);
                } else {
                  var unk = 'Unknown action "'+(args.action||"?")+'"';
                  chat.messages.push({role:"tool", tool_call_id:tc.id, content:unk, timestamp:getTimeStr()});
                  var toolEl = createMessageElement({role:"tool", tool_call_id:tc.id, content:unk, timestamp:getTimeStr()});
                  if (toolEl) container.appendChild(toolEl);
                }
              }
            } else {
              var na = 'Tool "'+tc.function.name+'" not available.';
              chat.messages.push({role:"tool", tool_call_id:tc.id, content:na, timestamp:getTimeStr()});
              var toolEl = createMessageElement({role:"tool", tool_call_id:tc.id, content:na, timestamp:getTimeStr()});
              if (toolEl) container.appendChild(toolEl);
            }
          } catch(terr) {
            var errMsg = "Error: "+terr.message;
            chat.messages.push({role:"tool", tool_call_id:tc.id, content:errMsg, timestamp:getTimeStr()});
            var toolEl = createMessageElement({role:"tool", tool_call_id:tc.id, content:errMsg, timestamp:getTimeStr()});
            if (toolEl) container.appendChild(toolEl);
            showToast("Tool error");
          }
        }
        removeStepBar();
        saveConversations();
        updateTokenDisplay();
        continue;  // Let model respond to tool results
      } else if (fullContent) {
        var finalMsg = {role:"assistant", content:fullContent, timestamp:getTimeStr()};
        chat.messages.push(finalMsg);
        var el = createMessageElement(finalMsg);
        if (el) container.appendChild(el);
        removeStepBar();
        saveConversations();
        updateTokenDisplay();
        break;
      } else {
        // Fallback non-streaming
        try {
          var sysP2 = getSystemPrompt();
          var md2 = ModuleSystem.getToolDescriptions();
          var ctx2 = md2 ? "\n\nModule tools: "+md2 : "";
          var am2 = [];
          if (sysP2||ctx2) am2.push({role:"system", content:(sysP2||"You are ChatSeed.")+ctx2});
          for (var i = 0; i < chat.messages.length; i++) am2.push(chat.messages[i]);
          var fb = await fetch("https://openrouter.ai/api/v1/chat/completions", {method:"POST", headers:{"Authorization":"Bearer "+API_KEY,"Content-Type":"application/json"}, body:JSON.stringify({model:selectedModelId||"openai/gpt-4o", messages:am2, tools:CORE_TOOLS.length>0?CORE_TOOLS:undefined, tool_choice:"auto", stream:false})});
          if (!fb.ok) throw Error("FB "+fb.status);
          var fd = await fb.json();
          var fm = fd.choices&&fd.choices[0]?fd.choices[0].message:null;
          if (fm && fm.tool_calls && fm.tool_calls.length) {
            var ftm = {role:"assistant", content: fm.content || null, tool_calls: fm.tool_calls, timestamp: getTimeStr()};
            chat.messages.push(ftm); var fte = createMessageElement(ftm); if (fte) container.appendChild(fte);
            for (var fi = 0; fi < fm.tool_calls.length; fi++) {
              var ft = fm.tool_calls[fi], fa;
              try { fa = JSON.parse(ft.function.arguments); } catch(e) { continue; }
              var mr = await ModuleSystem.handleToolCall(ft.function.name, fa, ft.id);
              if (mr !== null) { var ct = typeof mr==="string"?mr:JSON.stringify(mr); chat.messages.push({role:"tool", tool_call_id:ft.id, content:ct, timestamp:getTimeStr()}); var fel = createMessageElement({role:"tool", tool_call_id:ft.id, content:ct, timestamp:getTimeStr()}); if (fel) container.appendChild(fel); }
              else if (ft.function.name === "evolve_self") {
                var lr2 = handleEvolveSelfLineAction(fa);
                if (lr2 !== null) { chat.messages.push({role:"tool", tool_call_id:ft.id, content:lr2, timestamp:getTimeStr()}); var fel = createMessageElement({role:"tool", tool_call_id:ft.id, content:lr2, timestamp:getTimeStr()}); if (fel) container.appendChild(fel); }
                else if (fa.action === "analyze") { var a = "## Analysis\n"+(fa.description||"Done."); chat.messages.push({role:"tool", tool_call_id:ft.id, content:a, timestamp:getTimeStr()}); var fel = createMessageElement({role:"tool", tool_call_id:ft.id, content:a, timestamp:getTimeStr()}); if (fel) container.appendChild(fel); }
                else if ((fa.action==="write"||fa.action==="refactor")&&fa.new_code) { pushUndo(fa.new_filename||"chatseed-evolved.html",getCurrentSource(),fa.description||fa.action); var r = '<div class="downloads-header"><i class="fas fa-file-export"></i> '+(fa.action==="write"?"New file":"Refactored")+'</div>'+FileDownloader.add(fa.new_code,fa.new_filename||"chatseed-evolved.html",fa.description||fa.action); chat.messages.push({role:"tool", tool_call_id:ft.id, content:r, timestamp:getTimeStr()}); var fel = createMessageElement({role:"tool", tool_call_id:ft.id, content:r, timestamp:getTimeStr()}); if (fel) container.appendChild(fel); }
                else { var d = (fa.action||"Done")+": "+(fa.description||""); chat.messages.push({role:"tool", tool_call_id:ft.id, content:d, timestamp:getTimeStr()}); var fel = createMessageElement({role:"tool", tool_call_id:ft.id, content:d, timestamp:getTimeStr()}); if (fel) container.appendChild(fel); }
              } else { var n = 'Tool "'+ft.function.name+'" not available.'; chat.messages.push({role:"tool", tool_call_id:ft.id, content:n, timestamp:getTimeStr()}); var fel = createMessageElement({role:"tool", tool_call_id:ft.id, content:n, timestamp:getTimeStr()}); if (fel) container.appendChild(fel); }
            }
            removeStepBar(); saveConversations(); updateTokenDisplay();
            continue;
          } else { var ff = {role:"assistant", content:(fm&&fm.content)||"", timestamp:getTimeStr()}; chat.messages.push(ff); var fe = createMessageElement(ff); if (fe) container.appendChild(fe); removeStepBar(); saveConversations(); updateTokenDisplay(); break; }
        } catch(fbe) { showToast("Fallback failed: "+fbe.message); removeStepBar(); saveConversations(); break; }
      }
    }
    removeStepBar();
    saveConversations();
    updateTokenDisplay();
    attachCopyButtons();
    if (stepCount >= MAX_STEPS) showToast("Max steps ("+MAX_STEPS+") reached"); else if (stepCount > 0) showToast("Complete");
  } catch(err) {
    removeStepBar();
    removeStreamingBubble();
    if (err.name === "AbortError") showToast("Canceled");
    else { console.error(err); showToast("Error: "+err.message); }
    // FIXED: Always save even on cancel/error
    saveConversations();
    updateTokenDisplay();
  } finally {
    isProcessing = false;
    abortController = null;
    setProcessingUI(false);
  }
}

function quickPrompt(text) {
  document.getElementById("userInput").value = text;
  var es = document.getElementById("emptyState");
  if (es) es.style.display = "none";
  sendMessage();
}

// ===== EVENT SETUP =====
document.getElementById("userInput").addEventListener("keydown", function(e){
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  if (e.key === "Escape" && isProcessing) cancelStream();
});

document.getElementById("userInput").addEventListener("input", function(){
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 200)+"px";
});

document.getElementById("messages").addEventListener("scroll", function(){
  var c = this;
  document.getElementById("scrollFab").classList.toggle("show", autoScroll && c.scrollHeight-c.scrollTop-c.clientHeight >= 200);
});

var touchStartX = 0;
document.addEventListener("touchstart", function(e){ touchStartX = e.touches[0].clientX; });
document.addEventListener("touchend", function(e){
  var s = document.getElementById("sidebar");
  if (!s.classList.contains("open")) return;
  if (e.changedTouches[0].clientX - touchStartX < -60) closeSidebar();
});
document.addEventListener("keydown", function(e){ if (e.key === "Escape") { closeSidebar(); closeModelDropdown(); } });

function handleResize() {
  var m = isMobile();
  var ob = document.getElementById("hamburgerOpenBtn");
  var cb = document.getElementById("sidebarCloseBtn");
  if (ob) ob.style.display = m ? "flex" : "none";
  if (cb) cb.style.display = m ? "flex" : "none";
  if (!m) closeSidebar();
}
window.addEventListener("resize", handleResize);

function fetchModels() {
  if (!API_KEY) return;
  fetch("https://openrouter.ai/api/v1/models", {headers:{Authorization:"Bearer "+API_KEY}})
    .then(function(r){return r.json();})
    .then(function(data){
      AVAILABLE_MODELS = (data.data||[]).sort(function(a,b){return a.name.localeCompare(b.name);});
      modelPricing = {};
      for (var i = 0; i < AVAILABLE_MODELS.length; i++) { var m = AVAILABLE_MODELS[i]; if (m.pricing) modelPricing[m.id] = {input: parseFloat(m.pricing.prompt)||0, output: parseFloat(m.pricing.completion)||0}; }
      var input = document.getElementById("modelSearchInput");
      var chat = getCurrentChat();
      if (chat && chat.model) {
        var found = null;
        for (var i = 0; i < AVAILABLE_MODELS.length; i++) if (AVAILABLE_MODELS[i].id === chat.model) { found = AVAILABLE_MODELS[i]; break; }
        if (found) { input.value = found.name; input.dataset.modelId = found.id; selectedModelId = found.id; document.getElementById("currentModelHeader").textContent = found.name; }
      }
      if (!selectedModelId && AVAILABLE_MODELS.length) selectModelFromDropdown(AVAILABLE_MODELS[0].id);
    })
    .catch(function(e){});
}

function init() {
  renderChatHistory();
  if (conversations.length === 0) newChat(); else loadChat(conversations[0].id);
  setProcessingUI(false);
  fetchModels();
  handleResize();
  updateActiveModuleCount();
  renderModuleList();
}

window.onload = init;
</script></body></html>
